# Copyright (C) 2026  amwall contributors. Licensed GPL-3.0-or-later.
#
# Builds the amwall MSI installer on a Windows runner and attaches
# it to a GitHub Release. Triggered ONLY by an explicit version tag
# push (`git tag v0.1.0 && git push origin v0.1.0`) — pushes to
# main don't run this workflow.
#
# Output: target\wix\amwall-<version>-x86_64.msi attached to the
# tag's GitHub Release as the only asset.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  # Needed by softprops/action-gh-release to create the Release
  # and attach the MSI as an asset. Read-only `contents: read` is
  # the workflow default; releases need contents: write.
  contents: write

jobs:
  build-msi:
    name: Build MSI installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pin to 1.85 to match Cargo.toml's rust-version. dtolnay's
        # action is the maintained shim; rustup is preinstalled on
        # the windows-latest runner so this resolves quickly.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Includes the cargo-wix install we run below so the
          # tool isn't re-downloaded on every release. The key
          # changes when Cargo.lock or rust-toolchain changes,
          # invalidating the cache automatically.
          cache-on-failure: true

      - name: Run gates
        # Mirror the local gating commands (build / clippy / test)
        # so a tag pointing at a broken commit fails fast before
        # we burn time on the WiX build. The local repo runs the
        # same three checks before each commit.
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings
          cargo test --target x86_64-pc-windows-msvc

      - name: Ensure WiX Toolset 3.x is on PATH
        # windows-latest typically ships with WiX 3.11 preinstalled
        # under "C:\Program Files (x86)\WiX Toolset v3.11\bin", but
        # GitHub's runner image contents drift over time. choco
        # treats an already-installed package as a no-op (~2s),
        # so this is cheap insurance against a runner-image update
        # that drops WiX. cargo-wix invokes candle.exe / light.exe
        # by name, so they need to be on PATH.
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
            Write-Host "Added WiX bin dir to GITHUB_PATH"
            "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
          } else {
            Write-Host "candle.exe already on PATH"
          }

      - name: Build multilingual MSI with embedded transforms
        # WiX 3 cannot link 33 .wxl files into one MSI in a single
        # light.exe call — it dedupes string IDs across all loaded loc
        # files regardless of their Culture attributes. The canonical
        # multilingual approach is:
        #   1. Build a base MSI in en-US.
        #   2. Build a sibling MSI for each other culture.
        #   3. Use torch.exe to compute an .mst transform per culture
        #      (base.msi -> lang.msi).
        #   4. Embed every .mst into the base MSI's _Storages table
        #      named by the culture's LCID.
        #   5. Rewrite the Template summary property to list every
        #      LCID whose transform was embedded.
        # Per https://learn.microsoft.com/en-us/windows/win32/msi/multiple-language-distribution
        # Windows Installer then auto-applies the matching transform
        # at install time based on the user's system UI language.
        # Per-culture builds use `-cultures:<culture>;en-us` so cultures
        # missing from WixUIExtension (e.g. vi-VN) fall back to English
        # for stock dialog strings while still using our culture-specific
        # Changelog wording from the matching wix/lang/*.wxl file.
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value })
          $targetBin = "target\x86_64-pc-windows-msvc\release"
          $wixDir = "target\wix"
          $langDir = "$wixDir\lang"
          New-Item -ItemType Directory -Path $wixDir -Force | Out-Null
          New-Item -ItemType Directory -Path $langDir -Force | Out-Null

          # Compile main.wxs once — the same .wixobj is linked per culture.
          # -arch x64 sets the platform so the Template summary lists x64
          # (required by ICE80 because main.wxs has Win64="yes" components).
          candle.exe -nologo `
            -arch x64 `
            "-dVersion=$version" `
            "-dCargoTargetBinDir=$targetBin" `
            -ext WixUIExtension `
            -out "$wixDir\main.wixobj" `
            wix\main.wxs

          # Build base MSI in en-US.
          $baseMsi = "$wixDir\amwall-$version-x86_64.msi"
          light.exe -nologo `
            -ext WixUIExtension `
            -cultures:en-us `
            -loc wix\lang\en-us.wxl `
            -out $baseMsi `
            "$wixDir\main.wixobj"

          # Track every embedded LCID, starting with the base.
          $lcids = @([System.Globalization.CultureInfo]::new("en-US").LCID)

          # Build, transform, and embed each non-base culture.
          Get-ChildItem wix\lang\*.wxl | Where-Object { $_.BaseName -ne "en-us" } | ForEach-Object {
            $culture = $_.BaseName
            $lcid = [System.Globalization.CultureInfo]::new($culture).LCID
            $langMsi = "$langDir\$culture.msi"
            $mst = "$langDir\$culture.mst"

            light.exe -nologo `
              -ext WixUIExtension `
              "-cultures:$culture;en-us" `
              -loc $_.FullName `
              -out $langMsi `
              "$wixDir\main.wixobj"
            if ($LASTEXITCODE -ne 0) { throw "light.exe failed for $culture" }

            torch.exe -p -t language $baseMsi $langMsi -out $mst
            if ($LASTEXITCODE -ne 0) { throw "torch.exe failed for $culture" }

            cscript //nologo wix\scripts\embed-transform.vbs $baseMsi $mst $lcid
            if ($LASTEXITCODE -ne 0) { throw "embed-transform.vbs failed for $culture (LCID $lcid)" }

            $lcids += $lcid
          }

          # Rewrite the Template summary so Windows Installer treats
          # the MSI as multilingual and auto-picks the right transform.
          $lcidCsv = ($lcids | Sort-Object -Unique) -join ","
          cscript //nologo wix\scripts\set-languages.vbs $baseMsi $lcidCsv
          if ($LASTEXITCODE -ne 0) { throw "set-languages.vbs failed" }

          Write-Host "Built $baseMsi with $($lcids.Count) embedded languages: $lcidCsv"

      - name: Locate MSI + create stable-named copy
        # cargo-wix names its output `amwall-<version>-x86_64.msi`,
        # which is great for the asset list (users can tell which
        # version they're grabbing) but breaks
        # `releases/latest/download/<filename>` URLs in the README
        # download button — those need a filename that doesn't
        # change between releases. Solve by attaching BOTH:
        #   - amwall-<version>-x86_64.msi  (versioned, original)
        #   - amwall-x86_64.msi            (stable, copy)
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "target/wix" -Filter "amwall-*-x86_64.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI found under target/wix"
            exit 1
          }
          $stable = Join-Path $msi.Directory.FullName "amwall-x86_64.msi"
          Copy-Item $msi.FullName $stable -Force
          "versioned=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "stable=$stable" >> $env:GITHUB_OUTPUT

      - name: Create draft release with MSI
        # `draft: true` so the user reviews the release before
        # publishing — first-time releases especially. Switch to
        # false once the workflow is proven for the project.
        # `generate_release_notes: true` autopopulates the body
        # from commits since the previous tag.
        # Both the versioned and the stable-named MSI are
        # attached so the README's "Download" button can use
        # `releases/latest/download/amwall-x86_64.msi`.
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.msi.outputs.versioned }}
            ${{ steps.msi.outputs.stable }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
