# amwall — release builder.
# Copyright (C) 2026  amwall contributors. Licensed GPL-3.0-or-later.
#
# Builds the amwall MSI installer on a Windows runner and attaches
# it to a GitHub Release. Triggered ONLY by an explicit version tag
# push (`git tag v0.1.0 && git push origin v0.1.0`) — pushes to
# main don't run this workflow.
#
# Output: target\wix\amwall-<version>-x86_64.msi attached to the
# tag's GitHub Release as the only asset.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  # Needed by softprops/action-gh-release to create the Release
  # and attach the MSI as an asset. Read-only `contents: read` is
  # the workflow default; releases need contents: write.
  contents: write

jobs:
  build-msi:
    name: Build MSI installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pin to 1.85 to match Cargo.toml's rust-version. dtolnay's
        # action is the maintained shim; rustup is preinstalled on
        # the windows-latest runner so this resolves quickly.
        # `components: clippy` is required because dtolnay's action
        # only auto-includes clippy on the `stable` channel — when a
        # specific version is pinned, clippy must be requested
        # explicitly or `cargo clippy` errors with "not installed".
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Includes the cargo-wix install we run below so the
          # tool isn't re-downloaded on every release. The key
          # changes when Cargo.lock or rust-toolchain changes,
          # invalidating the cache automatically.
          cache-on-failure: true

      - name: Run gates
        # Mirror the local gating commands (build / clippy / test)
        # so a tag pointing at a broken commit fails fast before
        # we burn time on the WiX build. The local repo runs the
        # same three checks before each commit.
        # PowerShell does not chain on success by default, so each
        # command is followed by an explicit $LASTEXITCODE check —
        # otherwise a clippy or build failure would be silently
        # swallowed if the trailing `cargo test` happened to succeed.
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Ensure WiX Toolset 3.x is on PATH
        # windows-latest typically ships with WiX 3.11 preinstalled
        # under "C:\Program Files (x86)\WiX Toolset v3.11\bin", but
        # GitHub's runner image contents drift over time. choco
        # treats an already-installed package as a no-op (~2s),
        # so this is cheap insurance against a runner-image update
        # that drops WiX. cargo-wix invokes candle.exe / light.exe
        # by name, so they need to be on PATH.
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
            Write-Host "Added WiX bin dir to GITHUB_PATH"
            "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
          } else {
            Write-Host "candle.exe already on PATH"
          }

      - name: Build multilingual MSI with embedded transforms
        # Delegated to scripts/build-msi.ps1 so this workflow and the
        # local "Build MSI installer" task in .vscode/tasks.json stay
        # byte-identical — Ctrl+Shift+B and a tag push produce the
        # same MSI from the same script.
        shell: pwsh
        run: ./scripts/build-msi.ps1

      - name: Locate MSI + create stable-named copy
        # cargo-wix names its output `amwall-<version>-x86_64.msi`,
        # which is great for the asset list (users can tell which
        # version they're grabbing) but breaks
        # `releases/latest/download/<filename>` URLs in the README
        # download button — those need a filename that doesn't
        # change between releases. Solve by attaching BOTH:
        #   - amwall-<version>-x86_64.msi  (versioned, original)
        #   - amwall-x86_64.msi            (stable, copy)
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "target/wix" -Filter "amwall-*-x86_64.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI found under target/wix"
            exit 1
          }
          $stable = Join-Path $msi.Directory.FullName "amwall-x86_64.msi"
          Copy-Item $msi.FullName $stable -Force
          "versioned=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "stable=$stable" >> $env:GITHUB_OUTPUT

      - name: Extract release notes from tag annotation
        # The Windows MSI is produced from the main branch which
        # also carries the Linux port work — `generate_release_notes:
        # true` autopopulates the body from EVERY commit since the
        # previous tag, which for v1.1.5 was 30+ commits mostly
        # about the Mint port. That's noise for a Windows-only MSI
        # release. We tag releases with `git tag -a v1.1.5 -m '...'`
        # carrying a focused, Windows-user-facing description, so
        # read that annotation back and feed it to the release body.
        # Falls back to "no description" if the tag is lightweight
        # (no annotation), which makes that mistake obvious and
        # easy to fix in a re-tag.
        id: notes
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $body = git tag -l --format='%(contents)' $tag
          if (-not $body) {
            $body = "No release description — the tag is lightweight. Annotate with ``git tag -a $tag -m '...'`` and re-push to get focused notes."
          }
          # Multi-line GitHub Actions output via the heredoc-style
          # EOF marker; GHA enforces no-marker-in-content via a
          # random delimiter, which we approximate with a UUID-y
          # constant unlikely to appear in a release message.
          $delim = "EOF_RELEASE_NOTES_d4f8a7b3"
          "body<<$delim" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "$delim"   >> $env:GITHUB_OUTPUT

      - name: Create draft release with MSI
        # `draft: true` so the user reviews the release before
        # publishing — first-time releases especially. Switch to
        # false once the workflow is proven for the project.
        # Body comes from the annotated tag message (see prev step)
        # instead of GitHub's auto-changelog so the Windows MSI's
        # notes don't get spammed with unrelated commits from the
        # in-progress Linux port.
        # Both the versioned and the stable-named MSI are
        # attached so the README's "Download" button can use
        # `releases/latest/download/amwall-x86_64.msi`.
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ steps.notes.outputs.body }}
          files: |
            ${{ steps.msi.outputs.versioned }}
            ${{ steps.msi.outputs.stable }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
