[package]
name = "simplewall-rs"
version = "0.0.1"
edition = "2024"
description = "Rust port of simplewall, a Windows Filtering Platform (WFP) firewall"
license = "GPL-3.0-or-later"
repository = "https://github.com/simplewall-rs/simplewall-rs"
readme = "README.md"
authors = ["simplewall-rs contributors"]
rust-version = "1.85"

[dependencies]
quick-xml = "0.36"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.54", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_NetworkManagement_WindowsFilteringPlatform",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_LibraryLoader",
    "Win32_System_Rpc",
    "Win32_UI_Controls",
    "Win32_UI_HiDpi",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }

[target.'cfg(windows)'.build-dependencies]
embed-resource = "2.5"
