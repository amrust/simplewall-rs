[wizard]
title = "კეთილი იყოს თქვენი მობრძანება amwall-ში"
subtitle = "simplewall-ის კონფიგურაციის იმპორტი?"
import_btn = "იმპორტი"
start_fresh_btn = "ახლიდან დაწყება"
body = """amwall-მა აღმოაჩინა არსებული simplewall-ის კონფიგურაცია:

• მისამართი: %{path}
• %{apps} აპლიკაცია წესებით
• %{rules} მომხმარებლის წესი

იმპორტი კოპირებს simplewall-ის profile.xml-ს amwall-ში და გამოიყენებს მას საწყის წერტილად. simplewall დარჩება დაყენებული და მისი არსებული ბირთვის ფილტრები აქტიური რჩება — გამორთეთ simplewall amwall-ში \"ფილტრების ჩართვის\" დაწკაპუნებამდე, რათა თავიდან აიცილოთ ორივე ბრანდმაუერის გადაფარული წესები.

შეგიძლიათ ფაილი → იმპორტი მოგვიანებით, თუ ახლა გამოტოვებთ."""

