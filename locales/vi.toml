# --- Trình hướng dẫn lần đầu ---
[wizard]
title = "Chào mừng đến amwall"
subtitle = "Nhập cấu hình simplewall?"
import_btn = "Nhập"
start_fresh_btn = "Bắt đầu mới"
body = """amwall tìm thấy cấu hình simplewall hiện có:

• Đường dẫn: %{path}
• %{apps} ứng dụng có quy tắc
• %{rules} quy tắc tùy chỉnh

Nhập sẽ sao chép profile.xml của simplewall sang amwall và sử dụng làm điểm bắt đầu. simplewall vẫn được cài và các bộ lọc kernel hiện có vẫn hoạt động — tắt simplewall trước khi nhấn "Bật bộ lọc" trong amwall để tránh hai tường lửa áp dụng quy tắc chồng chéo.

Bạn có thể chạy Tệp → Nhập sau nếu bỏ qua bây giờ."""

