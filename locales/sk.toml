update_error_body = "Nepodarilo sa pripojiť na GitHub na kontrolu aktualizácií.\n\nMožné príčiny: žiadny internet, firewall blokuje amwall od odchádzajúceho HTTPS, alebo limit GitHub API (60 anonymných požiadaviek za hodinu). Skúste to neskôr."
admin_required_body = "Správa filtrov vyžaduje administrátorské oprávnenia.\n\nZatvorte amwall a znovu spustite zo zvýšeného príkazového riadka\n(pravý klik → \"Spustiť ako správca\")."
delete_rule_confirm = "Vymazať pravidlo \"%{name}\"?"
bulk_delete_confirm = "Odstrániť %{count} položiek z profilu?\n\nTáto akcia sa nedá vrátiť."
exit_body = "Filtre sú momentálne povolené. Ukončenie amwall ponechá filtre na mieste (prežijú ukončenie procesu). Pokračovať?"
clear_log_body = "Vymazať záznamy paketov? Toto vyprázdni záznamy v pamäti a skráti súbor záznamov na disku. Akcia sa nedá vrátiť."
emergency_reset_body = "Núdzový reset vykoná:\n\n• Odstráni každý WFP filter, ktorý amwall nainštaloval\n• Vyprázdni profil aplikácií a zoznam používateľských pravidiel\n• Vypne Povoliť filtre\n\nPoužite toto, ak amwall blokuje niečo, čo nedokážete identifikovať a potrebujete obnoviť predvolené sieťové správanie OS. Zmena je okamžitá. Pokračovať?"
allow_one_body = "%{name} je momentálne blokovaná. Povolenie mu umožní prístup k sieti pri ďalšom pokuse.\n\nPokračovať?"
allow_many_body = "%{count} predtým blokovaných aplikácií bude nastavených na Povoliť. Budú mať prístup k sieti pri ďalšom pokuse.\n\nPokračovať?"
