# --- Sprievodca prvým spustením ---
[wizard]
title = "Vitajte v amwall"
subtitle = "Importovať konfiguráciu simplewall?"
import_btn = "Importovať"
start_fresh_btn = "Začať odznova"
body = """amwall našiel existujúcu konfiguráciu simplewall:

• Cesta: %{path}
• %{apps} aplikácií s pravidlami
• %{rules} vlastných pravidiel

Import skopíruje profile.xml z simplewall do amwall a použije ho ako východiskový bod. simplewall zostane nainštalovaný a jeho existujúce filtre v jadre zostanú aktívne — zakážte simplewall pred kliknutím na \"Povoliť filtre\" v amwall, aby ste predišli prekrývaniu pravidiel oboch firewallov.

Môžete spustiť Súbor → Importovať neskôr, ak teraz preskočíte."""

