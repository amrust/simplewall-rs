# --- 首次執行精靈 ---
[wizard]
title = "歡迎使用 amwall"
subtitle = "匯入 simplewall 設定？"
import_btn = "匯入"
start_fresh_btn = "全新開始"
body = """amwall 發現了現有的 simplewall 設定：

• 路徑：%{path}
• %{apps} 個應用程式及其規則
• %{rules} 條自訂規則

匯入會將 simplewall 的 profile.xml 複製到 amwall 作為起始設定。simplewall 保持安裝狀態，其現有核心篩選器仍然有效——在 amwall 中按下「啟用篩選器」之前請先停用 simplewall，以避免兩個防火牆套用重疊的規則。

如果現在略過，您可以稍後透過 檔案 → 匯入 來匯入。"""

