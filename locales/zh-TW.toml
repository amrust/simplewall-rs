emergency_reset_body = "緊急重設將：\n\n• 移除 amwall 已安裝的所有 WFP 篩選器\n• 清空應用程式設定檔和使用者規則清單\n• 關閉啟用篩選器\n\n當 amwall 封鎖了您無法辨識的內容，且需要還原作業系統預設網路行為時，請使用此功能。變更將立即生效。是否繼續？"
