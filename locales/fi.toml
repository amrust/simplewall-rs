allow_one_body = "%{name} on tällä hetkellä estetty. Salliminen antaa sen käyttää verkkoa seuraavalla kerralla.\n\nJatketaanko?"
allow_many_body = "%{count} aiemmin estettyä sovellusta asetetaan sallituksi. Ne pääsevät verkkoon seuraavalla yrityksellä.\n\nJatketaanko?"
