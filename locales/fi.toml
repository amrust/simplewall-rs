disable_filters = "Poista suodattimet käytöstä"
settings = "Asetukset..."
exit = "Sulje amwall"

# --- Ensikäynnistyksen ohjattu toiminto ---
[wizard]
title = "Tervetuloa amwalliin"
subtitle = "Tuodaanko simplewall-asetukset?"
import_btn = "Tuo"
start_fresh_btn = "Aloita alusta"
body = """amwall löysi olemassa olevan simplewall-kokoonpanon:

• Polku: %{path}
• %{apps} sovellusta säännöillä
• %{rules} mukautettua sääntöä

Tuonti kopioi simplewallin profile.xml-tiedoston amwalliin ja käyttää sitä lähtökohtana. simplewall pysyy asennettuna ja sen olemassa olevat ytimen suodattimet pysyvät aktiivisina — poista simplewall käytöstä ennen kuin napsautat "Ota suodattimet käyttöön" amwallissa, jotta molemmat palomuurit eivät käytä päällekkäisiä sääntöjä.

Voit tuoda myöhemmin valitsemalla Tiedosto → Tuo, jos ohitat tämän nyt."""

