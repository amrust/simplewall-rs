admin_required_body = "Suodattimien hallinta vaatii järjestelmänvalvojan oikeudet.\n\nSulje amwall ja käynnistä uudelleen korotetusta komentorivestä\n(napsauta hiiren oikealla → \"Suorita järjestelmänvalvojana\")."
