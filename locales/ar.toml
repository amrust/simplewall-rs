update_error_body = "تعذر الوصول إلى GitHub للتحقق من التحديثات.\n\nالأسباب المحتملة: لا يوجد اتصال بالإنترنت، أو جدار الحماية يمنع amwall من HTTPS الصادر، أو حد معدل API الخاص بـ GitHub (60 طلب مجهول في الساعة). حاول مرة أخرى لاحقاً."
admin_required_body = "إدارة المرشحات تتطلب صلاحيات المسؤول.\n\nأغلق amwall وأعد تشغيله من سطر أوامر مرتفع الصلاحيات\n(انقر بزر الماوس الأيمن → \"تشغيل كمسؤول\")."
delete_rule_confirm = "هل تريد حذف القاعدة \"%{name}\"؟"
bulk_delete_confirm = "هل تريد إزالة %{count} إدخال من الملف الشخصي؟\n\nلا يمكن التراجع عن هذا الإجراء."
exit_body = "المرشحات مفعّلة حالياً. الخروج من amwall سيبقيها مطبّقة (تبقى فعّالة بعد إغلاق البرنامج). هل تريد المتابعة؟"
clear_log_body = "مسح سجل الحزم؟ سيتم إفراغ تبويب السجل في الذاكرة واقتطاع ملف السجل على القرص. لا يمكن التراجع عن هذا الإجراء."
emergency_reset_body = "إعادة التعيين الطارئة ستقوم بـ:\n\n• إزالة كل مرشح WFP قام amwall بتثبيته\n• إفراغ قائمة ملف التطبيقات وقواعد المستخدم\n• إيقاف تفعيل المرشحات\n\nاستخدم هذا إذا كان amwall يحظر شيئاً لا يمكنك تحديده وتحتاج إلى استعادة سلوك الشبكة الافتراضي لنظام التشغيل. التغيير فوري. هل تريد المتابعة؟"
allow_one_body = "%{name} محظور حالياً. السماح به سيمكّنه من الوصول إلى الشبكة في المرة القادمة.\n\nهل تريد المتابعة؟"
allow_many_body = "سيتم تعيين %{count} تطبيق محظور سابقاً إلى مسموح. ستتمكن من الوصول إلى الشبكة في المرة القادمة.\n\nهل تريد المتابعة؟"
