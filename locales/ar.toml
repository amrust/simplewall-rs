# --- معالج التشغيل الأول ---
[wizard]
title = "مرحباً بك في amwall"
subtitle = "استيراد إعدادات simplewall؟"
import_btn = "استيراد"
start_fresh_btn = "بداية جديدة"
body = """عثر amwall على إعدادات simplewall موجودة:

• المسار: %{path}
• %{apps} تطبيق مع قواعد
• %{rules} قاعدة مخصصة

الاستيراد سينسخ profile.xml الخاص بـ simplewall إلى amwall ويستخدمه كنقطة بداية. simplewall يبقى مثبتاً ومرشحات kernel الحالية تبقى نشطة — قم بتعطيل simplewall قبل النقر على "تفعيل المرشحات" في amwall لتجنب تطبيق كلا الجدارين لقواعد متداخلة.

يمكنك تشغيل ملف → استيراد لاحقاً إذا تخطيت الآن."""

