# --- Asistente de primer inicio ---
[wizard]
title = "Bienvenido/a a amwall"
subtitle = "¿Importar configuración de simplewall?"
import_btn = "Importar"
start_fresh_btn = "Empezar de cero"
body = """amwall encontró una configuración existente de simplewall:

• Ruta: %{path}
• %{apps} app(s) con reglas
• %{rules} regla(s) personalizada(s)

Al importar se copia el profile.xml de simplewall a amwall y se usa como punto de partida. simplewall permanece instalado y sus filtros de kernel existentes siguen activos — desactiva simplewall antes de hacer clic en «Activar filtros» en amwall para evitar que ambos firewalls apliquen reglas superpuestas.

Puede importar más tarde desde Archivo → Importar."""

