# --- Mensajes de diálogos ---
[message]
update_available_body = "amwall %{latest} está disponible (está usando %{current}).\n\n¿Abrir la página de releases en su navegador?"
update_uptodate_body = "Versión actual: %{current}\nÚltima versión: %{latest}\n\nYa está al día."
update_error_body = "No se pudo conectar con GitHub para buscar actualizaciones.\n\nPosibles causas: sin internet, el firewall bloquea las conexiones HTTPS salientes de amwall, o el límite de solicitudes de la API de GitHub (60 solicitudes anónimas por hora). Inténtelo más tarde."
admin_required_body = "La gestión de filtros requiere privilegios de Administrador.\n\nCierra amwall y vuelve a iniciarlo desde una terminal elevada\n(clic derecho → «Ejecutar como administrador»)."
delete_rule_confirm = "¿Eliminar la regla «%{name}»?"
bulk_delete_confirm = "¿Eliminar %{count} entradas del perfil?\n\nEsta acción no se puede deshacer."
exit_body = "Los filtros están actualmente activados. Salir de amwall los dejará en su lugar (sobreviven al cierre del proceso). ¿Continuar?"
clear_log_body = "¿Borrar el registro de paquetes? Esto vacía la pestaña de registro en memoria y trunca el archivo de registro en disco. La acción no se puede deshacer."
emergency_reset_body = "El restablecimiento de emergencia:\n\n• Eliminará todos los filtros WFP instalados por amwall\n• Vaciará las listas de perfil de apps y reglas de usuario\n• Desactivará «Activar filtros»\n\nUse esta opción si amwall está bloqueando algo que no puede identificar y necesita restaurar el comportamiento de red predeterminado del sistema. El cambio es inmediato. ¿Continuar?"
allow_one_body = "%{name} está actualmente bloqueado. Permitirlo le dará acceso a la red en su próximo intento.\n\n¿Continuar?"
allow_many_body = "%{count} apps previamente bloqueadas se configurarán como Permitidas. Podrán acceder a la red en su próximo intento.\n\n¿Continuar?"
blocked_notification = "Bloqueado: %{app}"

