body = """amwall พบการกำหนดค่า simplewall ที่มีอยู่:

• เส้นทาง: %{path}
• %{apps} แอปที่มีกฎ
• %{rules} กฎที่กำหนดเอง

การนำเข้าจะคัดลอก profile.xml ของ simplewall ไปยัง amwall และใช้เป็นจุดเริ่มต้น simplewall ยังคงติดตั้งอยู่และตัวกรอง kernel ที่มีอยู่ยังคงทำงาน — ปิดใช้งาน simplewall ก่อนคลิก "เปิดใช้ตัวกรอง" ใน amwall เพื่อหลีกเลี่ยงไฟร์วอลล์ทั้งสองใช้กฎที่ซ้อนทับกัน

