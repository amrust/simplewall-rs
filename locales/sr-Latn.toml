# --- Čarobnjak za prvo pokretanje ---
[wizard]
title = "Dobrodošli u amwall"
subtitle = "Uvesti simplewall konfiguraciju?"
import_btn = "Uvezi"
start_fresh_btn = "Počni ispočetka"
body = """amwall je pronašao postojeću simplewall konfiguraciju:

• Putanja: %{path}
• %{apps} aplikacija sa pravilima
• %{rules} korisničkih pravila

Uvoz kopira simplewall-ov profile.xml u amwall i koristi ga kao polaznu tačku. simplewall ostaje instaliran i njegovi postojeći filteri u kernelu ostaju aktivni — onemogućite simplewall pre nego što kliknete \"Omogući filtere\" u amwall-u da biste izbegli preklapanje pravila oba zaštitna zida.

Možete pokrenuti Datoteka → Uvezi kasnije ako sada preskočite."""

