bulk_delete_confirm = "Ukloniti %{count} stavki iz profila?\n\nOvo se ne može poništiti."
exit_body = "Filteri su trenutno omogućeni. Zatvaranje amwall-a će ih ostaviti na mestu (preživljavaju zatvaranje procesa). Nastaviti?"
clear_log_body = "Obrisati evidenciju paketa? Ovo će isprazniti evidenciju u memoriji i skratiti datoteku evidencije na disku. Radnja se ne može poništiti."
emergency_reset_body = "Hitno resetovanje će:\n\n• Ukloniti svaki WFP filter koji je amwall instalirao\n• Isprazniti profil aplikacija i listu korisničkih pravila\n• Isključiti Omogući filtere\n\nKoristite ovo ako amwall blokira nešto što ne možete da identifikujete i potrebno vam je da vratite podrazumevano mrežno ponašanje OS-a. Promena je trenutna. Nastaviti?"
allow_one_body = "%{name} je trenutno blokiran. Dozvoljavanje će mu omogućiti pristup mreži sledeći put kada pokuša.\n\nNastaviti?"
allow_many_body = "%{count} prethodno blokiranih aplikacija će biti postavljeno na Dozvoli. Imaće pristup mreži sledeći put kada pokušaju.\n\nNastaviti?"
