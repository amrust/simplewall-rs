# --- Assistant de premier lancement ---
[wizard]
title = "Bienvenue dans amwall"
subtitle = "Importer la configuration simplewall ?"
import_btn = "Importer"
start_fresh_btn = "Repartir de zéro"
body = """amwall a trouvé une configuration simplewall existante :

• Chemin : %{path}
• %{apps} app(s) avec des règles
• %{rules} règle(s) personnalisée(s)

L'importation copie le profile.xml de simplewall vers amwall et l'utilise comme point de départ. simplewall reste installé et ses filtres noyau existants restent actifs — désactivez simplewall avant de cliquer sur « Activer les filtres » dans amwall pour éviter que les deux pare-feu n'appliquent des règles en conflit.

Vous pourrez importer plus tard via Fichier → Importer."""

