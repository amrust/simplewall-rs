# --- Messages des boîtes de dialogue ---
[message]
update_available_body = "amwall %{latest} est disponible (vous utilisez %{current}).\n\nOuvrir la page des releases dans votre navigateur ?"
update_uptodate_body = "Version actuelle : %{current}\nDernière version : %{latest}\n\nDéjà à jour."
update_error_body = "Impossible de contacter GitHub pour vérifier les mises à jour.\n\nCauses possibles : pas d'internet, le pare-feu bloque les connexions HTTPS sortantes d'amwall, ou la limite de débit de l'API GitHub (60 requêtes anonymes par heure). Réessayez plus tard."
admin_required_body = "La gestion des filtres nécessite les privilèges Administrateur.\n\nFermez amwall et relancez-le depuis un terminal élevé\n(clic droit → « Exécuter en tant qu'administrateur »)."
delete_rule_confirm = "Supprimer la règle « %{name} » ?"
bulk_delete_confirm = "Supprimer %{count} entrées du profil ?\n\nCette action est irréversible."
exit_body = "Les filtres sont actuellement activés. Quitter amwall les laissera en place (ils survivent à l'arrêt du processus). Continuer ?"
clear_log_body = "Effacer le journal des paquets ? Cela vide l'onglet journal en mémoire et tronque le fichier journal sur le disque. L'action est irréversible."
emergency_reset_body = "La réinitialisation d'urgence va :\n\n• Supprimer tous les filtres WFP installés par amwall\n• Vider les listes de profils d'apps et de règles utilisateur\n• Désactiver « Activer les filtres »\n\nUtilisez cette option si amwall bloque quelque chose que vous ne pouvez pas identifier et que vous devez restaurer le comportement réseau par défaut du système. La modification est immédiate. Continuer ?"
allow_one_body = "%{name} est actuellement bloqué. L'autoriser lui permettra d'accéder au réseau lors de sa prochaine tentative.\n\nContinuer ?"
allow_many_body = "%{count} apps précédemment bloquées seront autorisées. Elles pourront accéder au réseau lors de leur prochaine tentative.\n\nContinuer ?"
blocked_notification = "Bloqué : %{app}"

