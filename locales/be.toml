settings = "Налады..."
exit = "Выйсці з amwall"

# --- Майстар першага запуску ---
[wizard]
title = "Вітаем у amwall"
subtitle = "Імпартаваць канфігурацыю simplewall?"
import_btn = "Імпарт"
start_fresh_btn = "Пачаць спачатку"
body = """amwall знайшоў існуючую канфігурацыю simplewall:

• Шлях: %{path}
• %{apps} праграм з правіламі
• %{rules} карыстальніцкіх правілаў

Імпарт капіюе profile.xml simplewall у amwall і выкарыстоўвае яго як пачатковую кропку. simplewall застаецца ўсталяваным, і яго існуючыя фільтры ядра застаюцца актыўнымі — адключыце simplewall перад націсканнем \"Уключыць фільтры\" ў amwall, каб пазбегнуць перакрыцця правілаў абодвума міжсеткавымі экранамі.

Вы можаце выканаць Файл → Імпарт пазней, калі прапусціце зараз."""

