# --- Тэксты дыялогаў ---
[message]
update_available_body = "amwall %{latest} даступна (вы выкарыстоўваеце %{current}).\n\nАдкрыць старонку рэлізаў у браўзеры?"
update_uptodate_body = "Бягучая версія: %{current}\nАпошняя версія: %{latest}\n\nУжо апошняя версія."
update_error_body = "Не ўдалося звязацца з GitHub для праверкі абнаўленняў.\n\nМагчымыя прычыны: адсутнасць інтэрнэту, міжсеткавы экран блакіруе выходны HTTPS amwall, або ліміт API GitHub (60 ананімных запытаў на гадзіну). Паспрабуйце пазней."
admin_required_body = "Кіраванне фільтрамі патрабуе правоў адміністратара.\n\nЗачыніце amwall і перазапусціце з павышанай каманднай радком\n(правай кнопкай → \"Запуск ад імя адміністратара\")."
delete_rule_confirm = "Выдаліць правіла \"%{name}\"?"
bulk_delete_confirm = "Выдаліць %{count} запісаў з профілю?\n\nГэта немагчыма адмяніць."
exit_body = "Фільтры зараз уключаны. Выхад з amwall пакіне іх на месцы (яны перажываюць завяршэнне працэсу). Працягнуць?"
clear_log_body = "Ачысціць журнал пакетаў? Гэта ачысціць укладку журнала ў памяці і абрэжа файл журнала на дыску. Дзеянне немагчыма адмяніць."
emergency_reset_body = "Аварыйны скід:\n\n• Выдаліць усе WFP фільтры, усталяваныя amwall\n• Ачысціць спіс профілю праграм і правілаў карыстальніка\n• Адключыць \"Уключыць фільтры\"\n\nВыкарыстоўвайце гэта, калі amwall блакіруе нешта, што вы не можаце ідэнтыфікаваць, і вам трэба аднавіць сеткавыя паводзіны АС па змаўчанні. Змяненне неадкладнае. Працягнуць?"
allow_one_body = "%{name} зараз заблакіравана. Дазвол дазволіць ёй атрымаць доступ да сеткі пры наступнай спробе.\n\nПрацягнуць?"
allow_many_body = "%{count} раней заблакіраваных праграм будуць пераведзены ў рэжым дазволу. Яны атрымаюць доступ да сеткі пры наступнай спробе.\n\nПрацягнуць?"
blocked_notification = "Заблакіравана: %{app}"

