# --- Førstekørselsguide ---
[wizard]
title = "Velkommen til amwall"
subtitle = "Importér simplewall-konfiguration?"
import_btn = "Importér"
start_fresh_btn = "Start forfra"
body = """amwall fandt en eksisterende simplewall-konfiguration:

• Sti: %{path}
• %{apps} program(mer) med regler
• %{rules} brugerdefinerede regel/regler

Import kopierer simplewall's profile.xml over til amwall og bruger den som udgangspunkt. simplewall forbliver installeret, og dens eksisterende kernefiltre forbliver aktive — deaktivér simplewall, før du klikker "Aktivér filtre" i amwall, for at undgå at begge firewalls anvender overlappende regler.

Du kan køre Fil → Importér senere, hvis du springer over nu."""

