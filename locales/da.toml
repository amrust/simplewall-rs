# --- Dialogbeskeder ---
[message]
update_available_body = "amwall %{latest} er tilgængelig (du kører %{current}).\n\nÅbn udgivelsessiden i din browser?"
update_uptodate_body = "Nuværende version: %{current}\nSeneste version: %{latest}\n\nAllerede opdateret."
update_error_body = "Kunne ikke nå GitHub for at tjekke for opdateringer.\n\nMulige årsager: ingen internet, firewallen blokerer amwall fra udgående HTTPS, eller GitHubs API-begrænsning (60 anonyme forespørgsler pr. time). Prøv igen senere."
admin_required_body = "Filterhåndtering kræver administratorrettigheder.\n\nLuk amwall og genstart fra en forhøjet kommandoprompt\n(højreklik → \"Kør som administrator\")."
delete_rule_confirm = "Slet reglen \"%{name}\"?"
bulk_delete_confirm = "Fjern %{count} poster fra profilen?\n\nDette kan ikke fortrydes."
exit_body = "Filtre er i øjeblikket aktiveret. Afslutning af amwall vil efterlade dem på plads (de overlever programafslutning). Fortsæt?"
clear_log_body = "Ryd pakkeloggen? Dette tømmer logfanen i hukommelsen og afkorter logfilen på disken. Handlingen kan ikke fortrydes."
emergency_reset_body = "Nødnulstilling vil:\n\n• Fjerne alle WFP-filtre som amwall har installeret\n• Tømme programprofilen og brugerreglerne\n• Slå Aktivér filtre fra\n\nBrug dette hvis amwall blokerer noget du ikke kan identificere, og du har brug for at gendanne operativsystemets standardnetværksadfærd. Ændringen er øjeblikkelig. Fortsæt?"
allow_one_body = "%{name} er i øjeblikket blokeret. Hvis du tillader det, vil det kunne nå netværket næste gang det prøver.\n\nFortsæt?"
allow_many_body = "%{count} tidligere blokerede programmer vil blive sat til Tillad. De vil kunne nå netværket næste gang de prøver.\n\nFortsæt?"
blocked_notification = "Blokeret: %{app}"

