# --- İlk başlatma sehrbazı ---
[wizard]
title = "amwall-a xoş gəldiniz"
subtitle = "simplewall konfiqurasiyası idxal edilsin?"
import_btn = "İdxal"
start_fresh_btn = "Sıfırdan başla"
body = """amwall mövcud simplewall konfiqurasiyası tapdı:

• Yol: %{path}
• %{apps} qaydası olan tətbiq
• %{rules} xüsusi qayda

İdxal, simplewall-ın profile.xml faylını amwall-a kopyalayır və onu başlanğıc nöqtəsi kimi istifadə edir. simplewall quraşdırılmış qalır və mövcud nüvə filtrləri aktiv qalır — hər iki firewall-ın üst-üstə düşən qaydalarının qarşısını almaq üçün amwall-da \"Filtrləri aktivləşdir\" düyməsini basmadan əvvəl simplewall-ı söndürün.

İndi keçsəniz, sonradan Fayl → İdxal ilə edə bilərsiniz."""

