update_error_body = "Yeniləmələri yoxlamaq üçün GitHub-a qoşulmaq mümkün olmadı.\n\nMümkün səbəblər: internet yoxdur, firewall amwall-ın çıxış HTTPS-ini bloklayır, və ya GitHub API limiti (saatda 60 anonim sorğu). Daha sonra yenidən cəhd edin."
admin_required_body = "Filtr idarəetməsi Administrator imtiyazları tələb edir.\n\namwall-ı bağlayın və yüksəldilmiş əmr sətirindən yenidən başladın\n(sağ klik → \"Administrator olaraq çalışdır\")."
delete_rule_confirm = "\"%{name}\" qaydası silinsin?"
bulk_delete_confirm = "Profildən %{count} qeyd silinsin?\n\nBu əməliyyat geri qaytarıla bilməz."
exit_body = "Filtrlər hazırda aktivdir. amwall-dan çıxmaq onları yerində saxlayacaq (proses bitdikdən sonra da qalırlar). Davam edilsin?"
clear_log_body = "Paketlər jurnalı təmizlənsin? Bu, yaddaşdakı jurnal qoymasını boşaldır və diskdəki jurnal faylını kəsir. Bu əməliyyat geri qaytarıla bilməz."
emergency_reset_body = "Təcili sıfırlama:\n\n• amwall-ın quraşdırdığı bütün WFP filtrlərini silir\n• Tətbiqlər Profili və İstifadəçi qaydaları siyahılarını boşaldır\n• \"Filtrləri aktivləşdir\" funksiyasını söndürür\n\nBunu amwall-ın nəyisə bloklaması və onu müəyyən edə bilmədiyiniz zaman, ƏS-in standart şəbəkə davranışını bərpa etmək üçün istifadə edin. Dəyişiklik dərhal tətbiq olunur. Davam edilsin?"
allow_one_body = "%{name} hazırda bloklanıb. İcazə vermək ona növbəti cəhdində şəbəkəyə çıxmağa imkan verəcək.\n\nDavam edilsin?"
allow_many_body = "%{count} əvvəl bloklanmış tətbiq İcazə rejiminə keçiriləcək. Onlar növbəti cəhdlərində şəbəkəyə çıxacaqlar.\n\nDavam edilsin?"
