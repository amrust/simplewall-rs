# --- Dialoq mətn mesajları ---
[message]
update_available_body = "amwall %{latest} mövcuddur (siz %{current} versiyasını istifadə edirsiniz).\n\nBuraxılışlar səhifəsini brauzerdə açmaq istəyirsiniz?"
