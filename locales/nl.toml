# --- Dialoogberichten ---
[message]
update_available_body = "amwall %{latest} is beschikbaar (u gebruikt %{current}).\n\nDe releasepagina openen in uw browser?"
update_uptodate_body = "Huidige versie: %{current}\nLaatste versie: %{latest}\n\nAl up-to-date."
update_error_body = "Kan GitHub niet bereiken om op updates te controleren.\n\nMogelijke oorzaken: geen internet, de firewall blokkeert uitgaand HTTPS-verkeer van amwall, of de API-limiet van GitHub (60 anonieme verzoeken per uur). Probeer het later opnieuw."
admin_required_body = "Filterbeheer vereist beheerdersrechten.\n\nSluit amwall en start het opnieuw vanuit een verhoogde opdrachtprompt\n(rechtermuisknop → \"Als administrator uitvoeren\")."
delete_rule_confirm = "De regel \"%{name}\" verwijderen?"
bulk_delete_confirm = "%{count} items uit het profiel verwijderen?\n\nDit kan niet ongedaan worden gemaakt."
exit_body = "Filters zijn momenteel ingeschakeld. Als u amwall afsluit, blijven ze actief (ze overleven het beëindigen van het proces). Doorgaan?"
clear_log_body = "De pakkettenlog wissen? Dit leegt het logtabblad in het geheugen en kapt het logbestand op schijf af. De actie kan niet ongedaan worden gemaakt."
emergency_reset_body = "De noodreset zal:\n\n• Alle WFP-filters verwijderen die amwall heeft geïnstalleerd\n• Het app-profiel en de lijst met gebruikersregels legen\n• Filters inschakelen uitschakelen\n\nGebruik dit als amwall iets blokkeert dat u niet kunt identificeren en u het standaard netwerkgedrag van het besturingssysteem wilt herstellen. De wijziging is onmiddellijk. Doorgaan?"
allow_one_body = "%{name} is momenteel geblokkeerd. Toestaan zorgt ervoor dat het de volgende keer dat het probeert verbinding te maken, het netwerk kan bereiken.\n\nDoorgaan?"
allow_many_body = "%{count} eerder geblokkeerde apps worden op Toestaan gezet. Ze kunnen het netwerk bereiken de volgende keer dat ze het proberen.\n\nDoorgaan?"
