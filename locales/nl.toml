# --- Eerste-keer-wizard ---
[wizard]
title = "Welkom bij amwall"
subtitle = "simplewall-configuratie importeren?"
import_btn = "Importeren"
start_fresh_btn = "Nieuw beginnen"
body = """amwall heeft een bestaande simplewall-configuratie gevonden:

• Pad: %{path}
• %{apps} app(s) met regels
• %{rules} aangepaste regel(s)

Importeren kopieert het profile.xml van simplewall naar amwall en gebruikt het als startpunt. simplewall blijft geïnstalleerd en de bestaande kernelfilters blijven actief — schakel simplewall uit voordat u op "Filters inschakelen" klikt in amwall om te voorkomen dat beide firewalls overlappende regels toepassen.

U kunt later Bestand → Importeren gebruiken als u dit nu overslaat."""

