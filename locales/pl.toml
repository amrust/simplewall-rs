# --- Kreator pierwszego uruchomienia ---
[wizard]
title = "Witaj w amwall"
subtitle = "Zaimportować konfigurację simplewall?"
import_btn = "Importuj"
start_fresh_btn = "Zacznij od nowa"
body = """amwall znalazł istniejącą konfigurację simplewall:

• Ścieżka: %{path}
• %{apps} aplikacji z regułami
• %{rules} niestandardowych reguł

Importowanie kopiuje plik profile.xml z simplewall do amwall i używa go jako punktu wyjścia. simplewall pozostaje zainstalowany, a istniejące filtry jądra pozostają aktywne — wyłącz simplewall przed kliknięciem „Włącz filtry" w amwall, aby uniknąć nakładania się reguł obu zapór.

Możesz użyć Plik → Importuj później, jeśli teraz pominiesz ten krok."""

