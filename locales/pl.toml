admin_required_body = "Zarządzanie filtrami wymaga uprawnień administratora.\n\nZamknij amwall i uruchom ponownie z podwyższonymi uprawnieniami\n(kliknij prawym przyciskiem → \"Uruchom jako administrator\")."
