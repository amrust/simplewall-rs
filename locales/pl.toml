exit_body = "Filtry są obecnie włączone. Zamknięcie amwall pozostawi je aktywne (przetrwają zakończenie procesu). Kontynuować?"
clear_log_body = "Wyczyścić dziennik pakietów? Spowoduje to opróżnienie karty dziennika w pamięci i obcięcie pliku dziennika na dysku. Tej operacji nie można cofnąć."
emergency_reset_body = "Awaryjny reset spowoduje:\n\n• Usunięcie wszystkich filtrów WFP zainstalowanych przez amwall\n• Opróżnienie profilu aplikacji i listy reguł użytkownika\n• Wyłączenie opcji Włącz filtry\n\nUżyj tego, jeśli amwall blokuje coś, czego nie możesz zidentyfikować i musisz przywrócić domyślne zachowanie sieciowe systemu. Zmiana jest natychmiastowa. Kontynuować?"
allow_one_body = "%{name} jest obecnie zablokowane. Zezwolenie umożliwi dostęp do sieci przy następnej próbie.\n\nKontynuować?"
allow_many_body = "%{count} wcześniej zablokowanych aplikacji zostanie ustawionych na Dozwolone. Uzyskają dostęp do sieci przy następnej próbie.\n\nKontynuować?"
