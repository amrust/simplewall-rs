update_error_body = "Não foi possível aceder ao GitHub para verificar atualizações.\n\nCausas possíveis: sem Internet, a firewall a bloquear o amwall de HTTPS de saída, ou limite de pedidos da API do GitHub (60 pedidos anónimos por hora). Tente novamente mais tarde."
admin_required_body = "A gestão de filtros requer privilégios de Administrador.\n\nFeche o amwall e reinicie a partir de um terminal elevado\n(clique com o botão direito → \"Executar como administrador\")."
delete_rule_confirm = "Eliminar a regra \"%{name}\"?"
bulk_delete_confirm = "Remover %{count} entradas do perfil?\n\nEsta ação não pode ser desfeita."
exit_body = "Os filtros estão ativados de momento. Sair do amwall irá deixá-los em vigor (sobrevivem ao encerramento do processo). Continuar?"
clear_log_body = "Limpar o registo de pacotes? Isto esvazia o separador de registo em memória e trunca o ficheiro de registo no disco. A ação não pode ser desfeita."
emergency_reset_body = "A reposição de emergência irá:\n\n• Remover todos os filtros WFP instalados pelo amwall\n• Esvaziar o Perfil de Aplicações e a lista de Regras do utilizador\n• Desativar Ativar filtros\n\nUtilize isto se o amwall estiver a bloquear algo que não consegue identificar e precisar de repor o comportamento de rede predefinido do sistema. A alteração é imediata. Continuar?"
allow_one_body = "%{name} está bloqueado de momento. Permitir fará com que aceda à rede na próxima tentativa.\n\nContinuar?"
allow_many_body = "%{count} aplicações anteriormente bloqueadas serão definidas como Permitidas. Acederão à rede na próxima tentativa.\n\nContinuar?"
