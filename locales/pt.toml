# --- Assistente de primeira execução ---
[wizard]
title = "Boas-vindas ao amwall"
subtitle = "Importar configuração do simplewall?"
import_btn = "Importar"
start_fresh_btn = "Começar de raiz"
body = """O amwall encontrou uma configuração existente do simplewall:

• Caminho: %{path}
• %{apps} aplicação(ões) com regras
• %{rules} regra(s) personalizada(s)

A importação copia o profile.xml do simplewall para o amwall e utiliza-o como ponto de partida. O simplewall permanece instalado e os seus filtros de kernel existentes continuam ativos — desative o simplewall antes de clicar em \"Ativar filtros\" no amwall para evitar que ambas as firewalls apliquem regras sobrepostas.

Pode executar Ficheiro → Importar mais tarde, caso queira saltar agora."""

