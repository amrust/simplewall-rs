# --- Asistent prima rulare ---
[wizard]
title = "Bine ați venit în amwall"
subtitle = "Importare configurație simplewall?"
import_btn = "Importare"
start_fresh_btn = "Pornire de la zero"
body = """amwall a găsit o configurație simplewall existentă:

• Cale: %{path}
• %{apps} aplicație/aplicații cu reguli
• %{rules} regulă/reguli personalizate

Importarea copiază profile.xml din simplewall în amwall și îl folosește ca punct de pornire. simplewall rămâne instalat și filtrele sale de kernel existente rămân active — dezactivați simplewall înainte de a face clic pe „Activare filtre" în amwall pentru a evita aplicarea de reguli suprapuse de ambele firewall-uri.

Puteți rula Fișier → Importare mai târziu dacă omiteți acum."""

