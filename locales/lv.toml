title = "Laipni lūgti amwall"
subtitle = "Importēt simplewall konfigurāciju?"
import_btn = "Importēt"
start_fresh_btn = "Sākt no jauna"
body = """amwall atrada esošu simplewall konfigurāciju:

• Ceļš: %{path}
• %{apps} programmas ar noteikumiem
• %{rules} pielāgoti noteikumi

Importēšana kopē simplewall profile.xml uz amwall un izmanto to kā sākumpunktu. simplewall paliek instalēts un tā esošie kodola filtri paliek aktīvi — atspējojiet simplewall pirms nospiežat \"Iespējot filtrus\" amwall, lai izvairītos no pārklājošiem noteikumiem.

Vēlāk varat izmantot Fails → Importēt, ja tagad izlaižat."""

