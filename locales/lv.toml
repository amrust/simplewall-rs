# --- Dialogu teksti ---
[message]
update_available_body = "amwall %{latest} ir pieejams (jūs izmantojat %{current}).\n\nAtvērt laidienu lapu pārlūkprogrammā?"
update_uptodate_body = "Pašreizējā versija: %{current}\nJaunākā versija: %{latest}\n\nJau ir jaunākā versija."
update_error_body = "Neizdevās sazināties ar GitHub, lai pārbaudītu atjauninājumus.\n\nIespējamie iemesli: nav interneta, ugunsmūris bloķē amwall izejošo HTTPS vai GitHub API ierobežojums (60 anonīmi pieprasījumi stundā). Mēģiniet vēlāk."
admin_required_body = "Filtru pārvaldībai nepieciešamas administratora tiesības.\n\nAizveriet amwall un palaidiet no jauna ar paaugstinātām tiesībām\n(labais klikšķis → \"Palaist kā administratoram\")."
delete_rule_confirm = "Dzēst noteikumu \"%{name}\"?"
bulk_delete_confirm = "Noņemt %{count} ierakstus no profila?\n\nŠo darbību nevar atsaukt."
exit_body = "Filtri pašlaik ir iespējoti. Izejot no amwall tie paliks aktīvi (tie saglabājas pēc procesa beigām). Turpināt?"
clear_log_body = "Notīrīt pakešu žurnālu? Tas iztukšos atmiņā esošo žurnāla cilni un saīsinās žurnāla failu diskā. Šo darbību nevar atsaukt."
emergency_reset_body = "Avārijas atiestatīšana:\n\n• Noņems katru WFP filtru, ko amwall ir instalējis\n• Iztukšos programmu profilu un lietotāja noteikumu sarakstus\n• Izslēgs filtru iespējošanu\n\nIzmantojiet šo, ja amwall bloķē kaut ko, ko nevarat identificēt, un jums jāatjauno OS noklusējuma tīkla uzvedība. Izmaiņas stājas spēkā nekavējoties. Turpināt?"
allow_one_body = "%{name} pašlaik ir bloķēts. Atļaušana ļaus tam piekļūt tīklam nākamajā reizē, kad tas mēģinās.\n\nTurpināt?"
allow_many_body = "%{count} iepriekš bloķētas programmas tiks iestatītas kā atļautas. Tās varēs piekļūt tīklam nākamajā reizē, kad mēģinās.\n\nTurpināt?"
blocked_notification = "Bloķēts: %{app}"

