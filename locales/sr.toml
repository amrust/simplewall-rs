# --- Чаробњак за прво покретање ---
[wizard]
title = "Добродошли у amwall"
subtitle = "Увести simplewall конфигурацију?"
import_btn = "Увези"
start_fresh_btn = "Почни испочетка"
body = """amwall је пронашао постојећу simplewall конфигурацију:

• Путања: %{path}
• %{apps} апликација са правилима
• %{rules} корисничких правила

Увоз копира simplewall-ов profile.xml у amwall и користи га као полазну тачку. simplewall остаје инсталиран и његови постојећи филтери у кернелу остају активни — онемогућите simplewall пре него што кликнете \"Омогући филтере\" у amwall-у да бисте избегли преклапање правила оба заштитна зида.

Можете покренути Датотека → Увези касније ако сада прескочите."""

