emergency_reset_body = "Хитно ресетовање ће:\n\n• Уклонити сваки WFP филтер који је amwall инсталирао\n• Испразнити профил апликација и листу корисничких правила\n• Искључити Омогући филтере\n\nКористите ово ако amwall блокира нешто што не можете да идентификујете и потребно вам је да вратите подразумевано мрежно понашање ОС-а. Промена је тренутна. Наставити?"
