# --- Мастер первого запуска ---
[wizard]
title = "Добро пожаловать в amwall"
subtitle = "Импортировать конфигурацию simplewall?"
import_btn = "Импортировать"
start_fresh_btn = "Начать заново"
body = """amwall обнаружил существующую конфигурацию simplewall:

• Путь: %{path}
• %{apps} приложений с правилами
• %{rules} пользовательских правил

Импорт скопирует profile.xml из simplewall и использует его как отправную точку. simplewall останется установленным, и его фильтры в ядре останутся активными — отключите simplewall перед нажатием «Включить фильтры» в amwall, чтобы избежать конфликта правил.

Вы можете выполнить Файл → Импорт позже, если пропустите сейчас."""

