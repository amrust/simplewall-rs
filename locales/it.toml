# --- Messaggi delle finestre di dialogo ---
[message]
update_available_body = "amwall %{latest} è disponibile (stai usando %{current}).\n\nAprire la pagina delle release nel browser?"
update_uptodate_body = "Versione attuale: %{current}\nUltima versione: %{latest}\n\nGià aggiornato."
update_error_body = "Impossibile raggiungere GitHub per verificare gli aggiornamenti.\n\nPossibili cause: nessuna connessione internet, il firewall blocca le connessioni HTTPS in uscita di amwall, o il limite di richieste dell'API di GitHub (60 richieste anonime all'ora). Riprova più tardi."
admin_required_body = "La gestione dei filtri richiede i privilegi di Amministratore.\n\nChiudi amwall e riavvialo da un terminale con privilegi elevati\n(clic destro → «Esegui come amministratore»)."
delete_rule_confirm = "Eliminare la regola «%{name}»?"
bulk_delete_confirm = "Rimuovere %{count} voci dal profilo?\n\nQuesta azione non può essere annullata."
exit_body = "I filtri sono attualmente attivati. Uscire da amwall li lascerà attivi (sopravvivono alla chiusura del processo). Continuare?"
clear_log_body = "Cancellare il registro pacchetti? Questo svuota la scheda del registro in memoria e tronca il file di registro su disco. L'azione non può essere annullata."
emergency_reset_body = "Il ripristino di emergenza:\n\n• Rimuoverà ogni filtro WFP installato da amwall\n• Svuoterà le liste del profilo app e delle regole utente\n• Disattiverà «Attiva filtri»\n\nUsa questa opzione se amwall sta bloccando qualcosa che non riesci a identificare e devi ripristinare il comportamento di rete predefinito del sistema. La modifica è immediata. Continuare?"
allow_one_body = "%{name} è attualmente bloccato. Consentirlo gli permetterà di accedere alla rete al prossimo tentativo.\n\nContinuare?"
allow_many_body = "%{count} app precedentemente bloccate saranno impostate su Consenti. Potranno accedere alla rete al prossimo tentativo.\n\nContinuare?"
blocked_notification = "Bloccato: %{app}"

