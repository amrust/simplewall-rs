# --- Procedura guidata al primo avvio ---
[wizard]
title = "Benvenuti in amwall"
subtitle = "Importare la configurazione di simplewall?"
import_btn = "Importa"
start_fresh_btn = "Inizia da zero"
body = """amwall ha trovato una configurazione simplewall esistente:

• Percorso: %{path}
• %{apps} app con regole
• %{rules} regola/e personalizzata/e

L'importazione copia il profile.xml di simplewall in amwall e lo usa come punto di partenza. simplewall resta installato e i suoi filtri kernel esistenti rimangono attivi — disattiva simplewall prima di fare clic su «Attiva filtri» in amwall per evitare che entrambi i firewall applichino regole sovrapposte.

Puoi importare in seguito da File → Importa."""

