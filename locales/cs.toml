# --- Průvodce prvním spuštěním ---
[wizard]
title = "Vítejte v amwall"
subtitle = "Importovat konfiguraci simplewall?"
import_btn = "Importovat"
start_fresh_btn = "Začít od nuly"
body = """amwall nalezl existující konfiguraci simplewall:

• Cesta: %{path}
• %{apps} aplikací s pravidly
• %{rules} vlastních pravidel

Import zkopíruje profile.xml simplewall do amwall a použije jej jako výchozí bod. simplewall zůstane nainstalován a jeho filtry jádra zůstanou aktivní — deaktivujte simplewall před kliknutím na „Zapnout filtry" v amwall, aby se předešlo překrývání pravidel obou firewallů.

Import můžete provést později přes Soubor → Importovat, pokud nyní přeskočíte."""

