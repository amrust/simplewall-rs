update_error_body = "Nepodařilo se kontaktovat GitHub pro kontrolu aktualizací.\n\nMožné příčiny: žádné připojení k internetu, firewall blokuje amwall pro odchozí HTTPS, nebo limit API GitHubu (60 anonymních požadavků za hodinu). Zkuste to později."
admin_required_body = "Správa filtrů vyžaduje oprávnění správce.\n\nZavřete amwall a znovu jej spusťte z příkazového řádku se zvýšenými oprávněními\n(pravý klik → \"Spustit jako správce\")."
delete_rule_confirm = "Smazat pravidlo \"%{name}\"?"
bulk_delete_confirm = "Odebrat %{count} záznamů z profilu?\n\nTuto akci nelze vrátit zpět."
exit_body = "Filtry jsou nyní zapnuty. Ukončení amwall je ponechá na místě (přetrvají po ukončení procesu). Pokračovat?"
clear_log_body = "Vymazat protokol paketů? Tím se vyprázdní záložka protokolu v paměti a zkrátí se soubor protokolu na disku. Tuto akci nelze vrátit zpět."
emergency_reset_body = "Nouzový reset provede:\n\n• Odebere všechny filtry WFP nainstalované amwall\n• Vyprázdní profil aplikací a seznam uživatelských pravidel\n• Vypne „Zapnout filtry”\n\nPoužijte toto, pokud amwall blokuje něco, co nemůžete identifikovat, a potřebujete obnovit výchozí síťové chování OS. Změna je okamžitá. Pokračovat?"
allow_one_body = "%{name} je nyní blokováno. Povolení umožní přístup k síti při dalším pokusu.\n\nPokračovat?"
allow_many_body = "%{count} dříve blokovaných aplikací bude nastaveno na Povolit. Získají přístup k síti při dalším pokusu.\n\nPokračovat?"
