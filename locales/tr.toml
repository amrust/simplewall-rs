# --- İlk çalıştırma sihirbazı ---
[wizard]
title = "amwall'a hoş geldiniz"
subtitle = "simplewall yapılandırması içe aktarılsın mı?"
import_btn = "İçe aktar"
start_fresh_btn = "Sıfırdan başla"
body = """amwall mevcut bir simplewall yapılandırması buldu:

• Yol: %{path}
• %{apps} kurallı uygulama
• %{rules} özel kural

İçe aktarma, simplewall'ın profile.xml dosyasını amwall'a kopyalar ve başlangıç noktası olarak kullanır. simplewall kurulu kalır ve mevcut çekirdek filtreleri etkin olmaya devam eder — her iki güvenlik duvarının çakışan kurallar uygulamasını önlemek için amwall'da "Filtreleri etkinleştir"e tıklamadan önce simplewall'ı devre dışı bırakın.

Şimdi atlarsanız daha sonra Dosya → İçe aktar kullanabilirsiniz."""

