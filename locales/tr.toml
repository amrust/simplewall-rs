admin_required_body = "Filtre yönetimi Yönetici ayrıcalıkları gerektirir.\n\namwall'ı kapatın ve yükseltilmiş bir komut satırından yeniden başlatın\n(sağ tıklayın → \"Yönetici olarak çalıştır\")."
