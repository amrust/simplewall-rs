emergency_reset_body = "Acil sıfırlama şunları yapacaktır:\n\n• amwall tarafından kurulan tüm WFP filtrelerini kaldırır\n• Uygulama Profilini ve Kullanıcı kuralları listesini boşaltır\n• Filtreleri etkinleştir seçeneğini kapatır\n\nBunu, amwall'ın tanımlayamadığınız bir şeyi engellemesi ve işletim sisteminin varsayılan ağ davranışını geri yüklemeniz gerektiğinde kullanın. Değişiklik anında uygulanır. Devam edilsin mi?"
allow_one_body = "%{name} şu anda engelli. İzin verilmesi, bir sonraki denemesinde ağa erişmesini sağlayacaktır.\n\nDevam edilsin mi?"
