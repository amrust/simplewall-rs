# --- Dialog body messages ---
[message]
update_available_body = "amwall %{latest} is available (you're running %{current}).\n\nOpen the releases page in your browser?"
update_uptodate_body = "Current version: %{current}\nLatest version: %{latest}\n\nAlready up to date."
update_error_body = "Could not reach GitHub to check for updates.\n\nPossible causes: no internet, the firewall blocking amwall from outbound HTTPS, or GitHub's API rate limit (60 anonymous requests per hour). Try again later."
admin_required_body = "Filter management requires Administrator privileges.\n\nClose amwall and re-launch from an elevated shell\n(right-click → \"Run as administrator\")."
delete_rule_confirm = "Delete the rule \"%{name}\"?"
bulk_delete_confirm = "Remove %{count} entries from the profile?\n\nThis can't be undone."
exit_body = "Filters are currently enabled. Quitting amwall will leave them in place (they survive process exit). Continue?"
clear_log_body = "Clear the packets log? This empties the in-memory log tab and truncates the on-disk log file. The action can't be undone."
emergency_reset_body = "Emergency reset will:\n\n• Remove every WFP filter amwall has installed\n• Empty the Apps Profile and User rules lists\n• Turn off Enable filters\n\nUse this if amwall is blocking something you can't identify and you need to restore the OS-default networking behavior. The change is immediate. Continue?"
allow_one_body = "%{name} is currently blocked. Allowing it will let it reach the network the next time it tries.\n\nContinue?"
allow_many_body = "%{count} previously-blocked apps will be set to Allow. They will reach the network the next time they try.\n\nContinue?"
blocked_notification = "Blocked: %{app}"

