# --- First-run wizard ---
[wizard]
title = "Welcome to amwall"
subtitle = "Import simplewall configuration?"
import_btn = "Import"
start_fresh_btn = "Start fresh"
body = """amwall found an existing simplewall configuration:

• Path: %{path}
• %{apps} app(s) with rules
• %{rules} custom rule(s)

Importing copies simplewall's profile.xml over to amwall and uses it as your starting point. simplewall stays installed and its existing kernel filters remain active — disable simplewall before clicking "Enable filters" in amwall to avoid both firewalls applying overlapping rules.

You can run File → Import later if you skip now."""

