# --- Pirmojo paleidimo vedlys ---
[wizard]
title = "Sveiki atvykę į amwall"
subtitle = "Importuoti simplewall konfigūraciją?"
import_btn = "Importuoti"
start_fresh_btn = "Pradėti iš naujo"
body = """amwall rado esamą simplewall konfigūraciją:

• Kelias: %{path}
• %{apps} programų su taisyklėmis
• %{rules} pasirinktinių taisyklių

Importavimas nukopijuoja simplewall profile.xml į amwall ir naudoja jį kaip pradinį tašką. simplewall lieka įdiegtas ir jo esami branduolio filtrai išlieka aktyvūs — išjunkite simplewall prieš spausdami \"Įjungti filtrus\" amwall, kad išvengtumėte persidengiančių taisyklių.

Galite pasirinkti Failas → Importuoti vėliau, jei dabar praleisite."""

