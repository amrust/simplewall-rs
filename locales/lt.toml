# --- Dialogų tekstai ---
[message]
update_available_body = "amwall %{latest} yra pasiekiamas (jūs naudojate %{current}).\n\nAtidaryti leidimų puslapį naršyklėje?"
update_uptodate_body = "Dabartinė versija: %{current}\nNaujausia versija: %{latest}\n\nJau naujausia versija."
update_error_body = "Nepavyko pasiekti GitHub atnaujinimų tikrinimui.\n\nGalimos priežastys: nėra interneto, ugniasienė blokuoja amwall išeinantį HTTPS, arba GitHub API limitas (60 anoniminių užklausų per valandą). Bandykite vėliau."
admin_required_body = "Filtrų valdymui reikalingos administratoriaus teisės.\n\nUždarykite amwall ir paleiskite iš naujo su padidintomis teisėmis\n(dešinys pelės mygtukas → \"Paleisti kaip administratorius\")."
delete_rule_confirm = "Ištrinti taisyklę \"%{name}\"?"
bulk_delete_confirm = "Pašalinti %{count} įrašų iš profilio?\n\nŠio veiksmo negalima atšaukti."
exit_body = "Filtrai šiuo metu įjungti. Išėjus iš amwall jie liks aktyvūs (jie išlieka po proceso pabaigos). Tęsti?"
clear_log_body = "Išvalyti paketų žurnalą? Tai ištuštins atmintyje esantį žurnalo skirtuką ir sutrumpins žurnalo failą diske. Šio veiksmo negalima atšaukti."
emergency_reset_body = "Avarinis atstatymas:\n\n• Pašalins kiekvieną WFP filtrą, kurį amwall įdiegė\n• Ištuštins programų profilį ir vartotojo taisyklių sąrašus\n• Išjungs filtrus\n\nNaudokite tai, jei amwall blokuoja kažką, ko negalite identifikuoti, ir jums reikia atkurti numatytąjį OS tinklo elgesį. Pakeitimas įsigalioja iš karto. Tęsti?"
allow_one_body = "%{name} šiuo metu užblokuota. Leidimas leis jai pasiekti tinklą kitą kartą bandant.\n\nTęsti?"
allow_many_body = "%{count} anksčiau blokuotų programų bus nustatytos kaip leidžiamos. Jos galės pasiekti tinklą kitą kartą bandydamos.\n\nTęsti?"
blocked_notification = "Užblokuota: %{app}"

