# --- Майстер першого запуску ---
[wizard]
title = "Ласкаво просимо до amwall"
subtitle = "Імпортувати конфігурацію simplewall?"
import_btn = "Імпортувати"
start_fresh_btn = "Почати з нуля"
body = """amwall знайшов наявну конфігурацію simplewall:

• Шлях: %{path}
• %{apps} програм із правилами
• %{rules} користувацьких правил

Імпорт скопіює profile.xml simplewall до amwall і використає його як початкову точку. simplewall залишиться встановленим, а його фільтри ядра залишаться активними — вимкніть simplewall перед натисканням «Увімкнути фільтри» в amwall, щоб уникнути перекриття правил обох фаєрволів.

Ви можете виконати Файл → Імпорт пізніше, якщо пропустите зараз."""

