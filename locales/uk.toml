# --- Текст діалогових повідомлень ---
[message]
update_available_body = "Доступна версія amwall %{latest} (у вас %{current}).\n\nВідкрити сторінку випусків у браузері?"
update_uptodate_body = "Поточна версія: %{current}\nОстання версія: %{latest}\n\nУ вас актуальна версія."
update_error_body = "Не вдалося зв'язатися з GitHub для перевірки оновлень.\n\nМожливі причини: немає інтернету, фаєрвол блокує amwall для вихідного HTTPS, або вичерпано ліміт API GitHub (60 анонімних запитів на годину). Спробуйте пізніше."
admin_required_body = "Керування фільтрами потребує прав адміністратора.\n\nЗакрийте amwall і запустіть від імені адміністратора\n(клацніть правою кнопкою → «Запустити від імені адміністратора»)."
delete_rule_confirm = "Видалити правило «%{name}»?"
bulk_delete_confirm = "Видалити %{count} записів з профілю?\n\nЦю дію не можна скасувати."
exit_body = "Фільтри наразі увімкнено. Вихід з amwall залишить їх на місці (вони зберігаються після завершення процесу). Продовжити?"
clear_log_body = "Очистити журнал пакетів? Це очистить вкладку журналу в пам'яті та скоротить файл журналу на диску. Цю дію не можна скасувати."
emergency_reset_body = "Аварійне скидання:\n\n• Видалить усі фільтри WFP, встановлені amwall\n• Очистить профіль програм і список правил користувача\n• Вимкне «Увімкнути фільтри»\n\nВикористовуйте це, якщо amwall блокує щось невідоме і потрібно відновити мережеву поведінку ОС за замовчуванням. Зміни набудуть чинності негайно. Продовжити?"
allow_one_body = "%{name} наразі заблоковано. Дозвіл надасть доступ до мережі при наступній спробі.\n\nПродовжити?"
allow_many_body = "%{count} раніше заблокованих програм буде переведено в режим «Дозволити». Вони отримають доступ до мережі при наступній спробі.\n\nПродовжити?"
blocked_notification = "Заблоковано: %{app}"

