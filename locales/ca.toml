# --- Assistent de primera execució ---
[wizard]
title = "Us donem la benvinguda a amwall"
subtitle = "Importar configuració de simplewall?"
import_btn = "Importa"
start_fresh_btn = "Comença de nou"
body = """amwall ha trobat una configuració existent de simplewall:

• Camí: %{path}
• %{apps} aplicació/ns amb regles
• %{rules} regla/es personalitzada/es

La importació copia el profile.xml de simplewall a amwall i l'utilitza com a punt de partida. simplewall es manté instal·lat i els seus filtres de kernel existents romanen actius — desactiveu simplewall abans de fer clic a \"Activar filtres\" a amwall per evitar que ambdós tallafocs apliquin regles superposades.

Podeu executar Fitxer → Importa més tard si ho ometeu ara."""

