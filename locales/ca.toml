# --- Cos dels missatges dels diàlegs ---
[message]
update_available_body = "amwall %{latest} està disponible (esteu executant %{current}).\n\nObrir la pàgina de versions al navegador?"
update_uptodate_body = "Versió actual: %{current}\nDarrera versió: %{latest}\n\nJa esteu actualitzat."
update_error_body = "No s'ha pogut accedir a GitHub per comprovar actualitzacions.\n\nPossibles causes: sense internet, el tallafocs bloquejant amwall de HTTPS de sortida, o el límit de peticions de l'API de GitHub (60 peticions anònimes per hora). Torneu-ho a intentar més tard."
admin_required_body = "La gestió de filtres requereix privilegis d'Administrador.\n\nTanqueu amwall i torneu-lo a obrir des d'un terminal elevat\n(clic dret → \"Executa com a administrador\")."
delete_rule_confirm = "Eliminar la regla \"%{name}\"?"
bulk_delete_confirm = "Eliminar %{count} entrades del perfil?\n\nAquesta acció no es pot desfer."
exit_body = "Els filtres estan activats. Sortir d'amwall els deixarà en vigor (sobreviuen a la finalització del procés). Voleu continuar?"
clear_log_body = "Esborrar el registre de paquets? Això buida la pestanya de registre en memòria i trunca el fitxer de registre al disc. L'acció no es pot desfer."
emergency_reset_body = "El reinici d'emergència farà:\n\n• Eliminar tots els filtres WFP instal·lats per amwall\n• Buidar el Perfil d'Aplicacions i la llista de Regles de l'usuari\n• Desactivar Activar filtres\n\nUtilitzeu això si amwall està bloquejant alguna cosa que no podeu identificar i necessiteu restaurar el comportament de xarxa per defecte del sistema. El canvi és immediat. Voleu continuar?"
allow_one_body = "%{name} està bloquejat. Permetre-ho farà que pugui accedir a la xarxa la propera vegada que ho intenti.\n\nVoleu continuar?"
allow_many_body = "%{count} aplicacions prèviament bloquejades es configuraran com a Permeses. Accediran a la xarxa la propera vegada que ho intentin.\n\nVoleu continuar?"
