emergency_reset_body = "Шашылыш баштапкы абалга келтирүү:\n\n• amwall орноткон бардык WFP фильтрлерди алып салат\n• Колдонмолор профилин жана колдонуучу эрежелеринин тизмелерин тазалайт\n• Фильтрлерди өчүрөт\n\nЭгер amwall сиз аныктай албаган нерсени бөгөттөп жатса жана OS демейки тармак иштешин калыбына келтирүү керек болсо колдонуңуз. Өзгөрүү дароо күчүнө кирет. Улантасызбы?"
