# --- Биринчи ишке киргизүү устасы ---
[wizard]
title = "amwall программасына кош келиңиз"
subtitle = "simplewall конфигурациясын импорттойсузбу?"
import_btn = "Импорттоо"
start_fresh_btn = "Жаңыдан баштоо"
body = """amwall учурдагы simplewall конфигурациясын тапты:

• Жолу: %{path}
• %{apps} эрежелери бар колдонмо
• %{rules} ыңгайлаштырылган эреже

Импорттоо simplewall программасынын profile.xml файлын amwall программасына көчүрөт жана аны баштапкы чекит катары колдонот. simplewall орнотулган бойдон калат жана анын ядро фильтрлери активдүү бойдон калат — кайчылаш эрежелерден качуу үчүн amwall программасында \"Фильтрлерди иштетүү\" баскычын баспастан мурда simplewall өчүрүңүз.

Азыр өткөрүп жиберсеңиз, кийинчерээк Файл → Импорттоо колдонсоңуз болот."""

