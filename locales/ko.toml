# --- 첫 실행 마법사 ---
[wizard]
title = "amwall에 오신 것을 환영합니다"
subtitle = "simplewall 설정을 가져오시겠습니까?"
import_btn = "가져오기"
start_fresh_btn = "새로 시작"
body = """amwall이 기존 simplewall 설정을 발견했습니다:

• 경로: %{path}
• %{apps}개 앱 및 규칙
• %{rules}개 사용자 지정 규칙

가져오기는 simplewall의 profile.xml을 amwall로 복사하여 시작점으로 사용합니다. simplewall은 설치된 상태로 유지되며 기존 커널 필터도 활성 상태입니다. 규칙이 중복 적용되지 않도록 amwall에서 "필터 활성화"를 클릭하기 전에 simplewall을 비활성화하세요.

지금 건너뛰어도 나중에 파일 → 가져오기에서 실행할 수 있습니다."""

