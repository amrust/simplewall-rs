# --- Առաժին գործարկման օգնական ---
[wizard]
title = "Բարի գալուստ amwall"
subtitle = "Ներկրմել simplewall կարգավորումը?"
import_btn = "Ներկրմել"
start_fresh_btn = "Սկսել զրոյից"
body = """amwall-ը գտել է գոյություն ունեցող simplewall կարգավորում:

• Ուղի: %{path}
• %{apps} հավելված(ներ) կանոններով
• %{rules} օգտագործի կանոն(ներ)

Ներկրմումը պատճենում է simplewall-ի profile.xml-ը amwall և օգտագործում է որպես մեկնարկային կետ. simplewall-ը մնում է տեղադրված և նրա գոյություն ունեցող միժուկի զտրիչներ ակտիվ են — անժատեք simplewall-ը amwall-ում \"Զտրիչների միացում\" սեղմելից առաժ, որպեսզի երկու հրակապատների համընկնող կանոններ խուսափեն.

Կարող եք Ֆայլ → Ներկրմում ավելի ուշ, եթե հիմա բաց թողնեք."""

