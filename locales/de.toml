bulk_delete_confirm = "%{count} Einträge aus dem Profil entfernen?\n\nDies kann nicht rückgängig gemacht werden."
exit_body = "Filter sind derzeit aktiviert. Beim Beenden von amwall bleiben sie bestehen (sie überleben das Prozessende). Fortfahren?"
clear_log_body = "Paketprotokoll löschen? Dies leert das Protokoll-Tab im Arbeitsspeicher und kürzt die Protokolldatei auf der Festplatte. Die Aktion kann nicht rückgängig gemacht werden."
emergency_reset_body = "Der Notfall-Reset wird:\n\n• Jeden von amwall installierten WFP-Filter entfernen\n• Die App-Profil- und Benutzerregellisten leeren\n• „Filter aktivieren” ausschalten\n\nVerwenden Sie dies, wenn amwall etwas blockiert, das Sie nicht identifizieren können, und Sie das Standard-Netzwerkverhalten des Betriebssystems wiederherstellen müssen. Die Änderung ist sofort wirksam. Fortfahren?"
allow_one_body = "%{name} ist derzeit blockiert. Wenn Sie es zulassen, kann es beim nächsten Versuch auf das Netzwerk zugreifen.\n\nFortfahren?"
allow_many_body = "%{count} zuvor blockierte Apps werden auf „Zulassen” gesetzt. Sie können beim nächsten Versuch auf das Netzwerk zugreifen.\n\nFortfahren?"
