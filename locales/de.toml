update_error_body = "GitHub konnte nicht erreicht werden, um nach Updates zu suchen.\n\nMögliche Ursachen: kein Internet, die Firewall blockiert ausgehende HTTPS-Verbindungen von amwall, oder das API-Rate-Limit von GitHub (60 anonyme Anfragen pro Stunde). Versuchen Sie es später erneut."
admin_required_body = "Filterverwaltung erfordert Administratorrechte.\n\nSchließen Sie amwall und starten Sie es aus einer erhöhten Shell\n(Rechtsklick → „Als Administrator ausführen\")."
