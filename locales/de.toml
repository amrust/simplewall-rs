# --- Erststart-Assistent ---
[wizard]
title = "Willkommen bei amwall"
subtitle = "simplewall-Konfiguration importieren?"
import_btn = "Importieren"
start_fresh_btn = "Neu starten"
body = """amwall hat eine bestehende simplewall-Konfiguration gefunden:

• Pfad: %{path}
• %{apps} App(s) mit Regeln
• %{rules} benutzerdefinierte Regel(n)

Beim Importieren wird simplewall's profile.xml zu amwall kopiert und als Ausgangspunkt verwendet. simplewall bleibt installiert und seine bestehenden Kernel-Filter bleiben aktiv — deaktivieren Sie simplewall, bevor Sie „Filter aktivieren" in amwall klicken, um sich überschneidende Regeln zu vermeiden.

Sie können dies später über Datei → Importieren nachholen."""

