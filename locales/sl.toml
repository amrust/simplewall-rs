# --- Čarovnik za prvi zagon ---
[wizard]
title = "Dobrodošli v amwall"
subtitle = "Uvoziti simplewall konfiguracijo?"
import_btn = "Uvozi"
start_fresh_btn = "Začni znova"
body = """amwall je našel obstoječo simplewall konfiguracijo:

• Pot: %{path}
• %{apps} aplikacij s pravili
• %{rules} uporabniških pravil

Uvoz kopira simplewall-ov profile.xml v amwall in ga uporabi kot izhodišče. simplewall ostane nameščen in njegovi obstoječi filtri v jedru ostanejo aktivni — onemogočite simplewall, preden kliknete \"Omogoči filtre\" v amwall, da se izognete prekrivanju pravil obeh požarnih zidov.

Lahko zaženete Datoteka → Uvozi pozneje, če zdaj preskočite."""

