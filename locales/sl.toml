update_error_body = "Ni se bilo mogoče povezati z GitHub za preverjanje posodobitev.\n\nMožni vzroki: ni interneta, požarni zid blokira amwall za odhodne HTTPS, ali omejitev GitHub API-ja (60 anonimnih zahtev na uro). Poskusite pozneje."
admin_required_body = "Upravljanje filtrov zahteva skrbniške pravice.\n\nZaprite amwall in ga znova zaženite iz povišenega ukaznega poziva\n(desni klik → \"Zaženi kot skrbnik\")."
delete_rule_confirm = "Izbrisati pravilo \"%{name}\"?"
bulk_delete_confirm = "Odstraniti %{count} vnosov iz profila?\n\nTega ni mogoče razveljaviti."
exit_body = "Filtri so trenutno omogočeni. Zapustitev amwall jih bo pustila na mestu (preživijo zaključek procesa). Nadaljevati?"
clear_log_body = "Počistiti dnevnik paketov? To izprazni dnevnik v pomnilniku in skrajša datoteko dnevnika na disku. Dejanja ni mogoče razveljaviti."
emergency_reset_body = "Zasilna ponastavitev bo:\n\n• Odstranila vsak WFP filter, ki ga je amwall namestil\n• Izpraznila profil aplikacij in seznam uporabniških pravil\n• Izklopila Omogoči filtre\n\nUporabite to, če amwall blokira nekaj, česar ne morete identificirati in morate obnoviti privzeto omrežno vedenje OS. Sprememba je takojšnja. Nadaljevati?"
allow_one_body = "%{name} je trenutno blokirana. Dovolitev mu bo omogočila dostop do omrežja ob naslednjem poskusu.\n\nNadaljevati?"
allow_many_body = "%{count} predhodno blokiranih aplikacij bo nastavljenih na Dovoli. Do omrežja bodo dostopale ob naslednjem poskusu.\n\nNadaljevati?"
