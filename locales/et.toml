# --- Dialoogide tekstid ---
[message]
update_available_body = "amwall %{latest} on saadaval (teil on %{current}).\n\nKas avada väljaannete leht brauseris?"
update_uptodate_body = "Praegune versioon: %{current}\nViimane versioon: %{latest}\n\nJuba uusim versioon."
update_error_body = "GitHub-iga ei õnnestunud värskenduste kontrollimiseks ühendust saada.\n\nVõimalikud põhjused: internet puudub, tulemüür blokeerib amwall-i väljuvat HTTPS-i või GitHub API piirang (60 anonüümset päringut tunnis). Proovige hiljem uuesti."
admin_required_body = "Filtrite haldamiseks on vaja administraatori õigusi.\n\nSulgege amwall ja käivitage uuesti kõrgendatud õigustega\n(paremklõps → \"Käivita administraatorina\")."
delete_rule_confirm = "Kustutada reegel \"%{name}\"?"
bulk_delete_confirm = "Eemaldada %{count} kirjet profiilist?\n\nSeda ei saa tagasi võtta."
exit_body = "Filtrid on praegu lubatud. amwall-ist väljumine jätab need paika (need jäävad pärast protsessi lõppemist). Jätkata?"
clear_log_body = "Tühjendada pakettide logi? See tühjendab mälus oleva logi vahekaardi ja kärpib logifaili kettal. Seda ei saa tagasi võtta."
emergency_reset_body = "Hädaolukorra lähtestamine:\n\n• Eemaldab kõik WFP filtrid, mille amwall on paigaldanud\n• Tühjendab rakenduste profiili ja kasutaja reeglite loendid\n• Lülitab filtrid välja\n\nKasutage seda, kui amwall blokeerib midagi, mida te ei suuda tuvastada, ja teil on vaja taastada OS vaikimisi võrgukäitumine. Muudatus jõustub kohe. Jätkata?"
allow_one_body = "%{name} on praegu blokeeritud. Lubamine võimaldab sellel järgmisel korral võrku pääseda.\n\nJätkata?"
allow_many_body = "%{count} varem blokeeritud rakendust seatakse lubatuks. Nad pääsevad võrku järgmisel korral, kui proovivad.\n\nJätkata?"
blocked_notification = "Blokeeritud: %{app}"

