# --- Esimese käivituse viisard ---
[wizard]
title = "Tere tulemast amwall-i"
subtitle = "Importida simplewall-i seadistus?"
import_btn = "Impordi"
start_fresh_btn = "Alusta nullist"
body = """amwall leidis olemasoleva simplewall-i seadistuse:

• Asukoht: %{path}
• %{apps} rakendust reeglitega
• %{rules} kohandatud reeglit

Importimine kopeerib simplewall-i profile.xml amwall-i ja kasutab seda lähtepunktina. simplewall jääb paigaldatuks ja selle olemasolevad tuumafiltrid jäävad aktiivseks — keelake simplewall enne amwall-is \"Luba filtrid\" vajutamist, et vältida kattuvaid reegleid.

Saate hiljem kasutada Fail → Impordi, kui jätate praegu vahele."""

