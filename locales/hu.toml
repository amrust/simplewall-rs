update_uptodate_body = "Jelenlegi verzió: %{current}\nLegújabb verzió: %{latest}\n\nMár naprakész."
update_error_body = "Nem sikerült elérni a GitHubot a frissítések ellenőrzéséhez.\n\nLehetséges okok: nincs internet, a tűzfal blokkolja az amwall kimenő HTTPS-forgalmát, vagy a GitHub API korlátja (60 névtelen kérés óránként). Próbálja újra később."
admin_required_body = "A szűrőkezelés rendszergazdai jogosultságot igényel.\n\nZárja be az amwall-t és indítsa újra emelt jogosultságú parancssorból\n(jobb klikk → \"Futtatás rendszergazdaként\")."
delete_rule_confirm = "Törli a(z) \"%{name}\" szabályt?"
bulk_delete_confirm = "Eltávolít %{count} bejegyzést a profilból?\n\nEz nem vonható vissza."
exit_body = "A szűrők jelenleg engedélyezve vannak. Az amwall bezárása a helyükön hagyja őket (túlélik a folyamat leállását). Folytatja?"
clear_log_body = "Törli a csomagnaplót? Ez kiüríti a memóriában lévő naplófület és csonkítja a lemezen lévő naplófájlt. A művelet nem vonható vissza."
emergency_reset_body = "A vészhelyzeti visszaállítás:\n\n• Eltávolítja az amwall által telepített összes WFP szűrőt\n• Kiüríti az alkalmazásprofilt és a felhasználói szabályok listáját\n• Kikapcsolja a „Szűrők engedélyezése” lehetőséget\n\nHasználja ezt, ha az amwall blokkol valamit, amit nem tud azonosítani, és vissza kell állítania az operációs rendszer alapértelmezett hálózati viselkedését. A változás azonnali. Folytatja?"
allow_one_body = "A(z) %{name} jelenleg blokkolt. Az engedélyezés lehetővé teszi a hálózati hozzáférést a következő próbálkozáskor.\n\nFolytatja?"
allow_many_body = "%{count} korábban blokkolt alkalmazás Engedélyezés állapotba kerül. A következő próbálkozáskor hozzáférhetnek a hálózathoz.\n\nFolytatja?"
blocked_notification = "Blokkolt: %{app}"

