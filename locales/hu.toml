# --- Első indítási varázsló ---
[wizard]
title = "Üdvözli az amwall"
subtitle = "simplewall konfiguráció importálása?"
import_btn = "Importálás"
start_fresh_btn = "Újrakezdés"
body = """Az amwall talált egy meglévő simplewall konfigurációt:

• Elérési út: %{path}
• %{apps} alkalmazás szabályokkal
• %{rules} egyéni szabály

Az importálás átmásolja a simplewall profile.xml fájlját az amwall-ba, és kiindulópontként használja. A simplewall telepítve marad, és kernelszűrői aktívak maradnak — tiltsa le a simplewall-t, mielőtt az amwall-ban a „Szűrők engedélyezése" gombra kattint, hogy elkerülje a két tűzfal átfedő szabályait.

A Fájl → Importálás menüponttal később is elvégezheti, ha most kihagyja."""

