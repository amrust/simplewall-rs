clear_log_body = "清除数据包日志？这将清空内存中的日志标签页并截断磁盘上的日志文件。此操作无法撤销。"
emergency_reset_body = "紧急重置将：\n\n• 移除 amwall 已安装的所有 WFP 过滤器\n• 清空应用配置文件和用户规则列表\n• 关闭启用过滤器\n\n当 amwall 阻止了您无法识别的内容，且需要恢复操作系统默认网络行为时，请使用此功能。更改将立即生效。是否继续？"
allow_one_body = "%{name} 当前已被阻止。允许后，它将在下次尝试时可以访问网络。\n\n是否继续？"
