# --- 首次运行向导 ---
[wizard]
title = "欢迎使用 amwall"
subtitle = "导入 simplewall 配置？"
import_btn = "导入"
start_fresh_btn = "全新开始"
body = """amwall 发现了现有的 simplewall 配置：

• 路径：%{path}
• %{apps} 个应用及其规则
• %{rules} 条自定义规则

导入会将 simplewall 的 profile.xml 复制到 amwall 作为起始配置。simplewall 保持安装状态，其现有内核过滤器仍然有效——在 amwall 中点击"启用过滤器"之前请先禁用 simplewall，以避免两个防火墙应用重叠的规则。

如果现在跳过，您可以稍后通过 文件 → 导入 来导入。"""

