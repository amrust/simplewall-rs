# --- Wizard pertama kali ---
[wizard]
title = "Selamat datang di amwall"
subtitle = "Impor konfigurasi simplewall?"
import_btn = "Impor"
start_fresh_btn = "Mulai baru"
body = """amwall menemukan konfigurasi simplewall yang ada:

• Jalur: %{path}
• %{apps} aplikasi dengan aturan
• %{rules} aturan kustom

Mengimpor akan menyalin profile.xml simplewall ke amwall dan menggunakannya sebagai titik awal. simplewall tetap terpasang dan filter kernel yang ada tetap aktif — nonaktifkan simplewall sebelum mengklik "Aktifkan filter" di amwall untuk menghindari kedua firewall menerapkan aturan yang tumpang tindih.

Anda dapat menjalankan Berkas → Impor nanti jika melewati sekarang."""

