# --- Isi pesan dialog ---
[message]
update_available_body = "amwall %{latest} tersedia (Anda menggunakan %{current}).\n\nBuka halaman rilis di peramban?"
update_uptodate_body = "Versi saat ini: %{current}\nVersi terbaru: %{latest}\n\nSudah terbaru."
update_error_body = "Tidak dapat menghubungi GitHub untuk memeriksa pembaruan.\n\nKemungkinan penyebab: tidak ada internet, firewall memblokir amwall dari HTTPS keluar, atau batas kecepatan API GitHub (60 permintaan anonim per jam). Coba lagi nanti."
admin_required_body = "Pengelolaan filter memerlukan hak istimewa Administrator.\n\nTutup amwall dan luncurkan ulang dari shell yang ditinggikan\n(klik kanan → \"Jalankan sebagai administrator\")."
delete_rule_confirm = "Hapus aturan \"%{name}\"?"
bulk_delete_confirm = "Hapus %{count} entri dari profil?\n\nTindakan ini tidak dapat dibatalkan."
exit_body = "Filter saat ini aktif. Menutup amwall akan membiarkannya tetap berlaku (filter bertahan setelah proses keluar). Lanjutkan?"
clear_log_body = "Bersihkan log paket? Ini mengosongkan tab log di memori dan memotong berkas log di disk. Tindakan ini tidak dapat dibatalkan."
emergency_reset_body = "Pengaturan ulang darurat akan:\n\n• Menghapus setiap filter WFP yang dipasang amwall\n• Mengosongkan daftar Profil Aplikasi dan Aturan pengguna\n• Menonaktifkan Aktifkan filter\n\nGunakan ini jika amwall memblokir sesuatu yang tidak dapat Anda identifikasi dan Anda perlu memulihkan perilaku jaringan default OS. Perubahan berlaku segera. Lanjutkan?"
allow_one_body = "%{name} saat ini diblokir. Mengizinkannya akan membiarkannya mengakses jaringan saat berikutnya mencoba.\n\nLanjutkan?"
allow_many_body = "%{count} aplikasi yang diblokir sebelumnya akan diubah ke Izinkan. Mereka akan mengakses jaringan saat berikutnya mereka mencoba.\n\nLanjutkan?"
blocked_notification = "Diblokir: %{app}"

