# --- راهنمای اولین اجرا ---
[wizard]
title = "به amwall خوش آمدید"
subtitle = "پیکربندی simplewall درون‌ریزی شود؟"
import_btn = "درون‌ریزی"
start_fresh_btn = "شروع تازه"
body = """amwall یک پیکربندی موجود simplewall پیدا کرد:

• مسیر: %{path}
• %{apps} برنامه با قوانین
• %{rules} قانون سفارشی

درون‌ریزی، فایل profile.xml از simplewall را به amwall کپی کرده و به عنوان نقطه شروع استفاده می‌کند. simplewall نصب باقی می‌ماند و فیلترهای هسته موجود آن فعال می‌مانند — قبل از کلیک روی \"فعال کردن فیلترها\" در amwall، simplewall را غیرفعال کنید تا از اعمال قوانین همپوشان توسط هر دو دیوار آتش جلوگیری شود.

می‌توانید بعدا از طریق فایل → درون‌ریزی این کار را انجام دهید."""

