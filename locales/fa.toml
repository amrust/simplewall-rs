# --- متن پیام‌های پنجره‌های گفتگو ---
[message]
update_available_body = "amwall %{latest} موجود است (شما نسخه %{current} را اجرا می‌کنید).\n\nصفحه انتشارها را در مرورگر باز کنید؟"
update_uptodate_body = "نسخه فعلی: %{current}\nآخرین نسخه: %{latest}\n\nدر حال حاضر به‌روز است."
update_error_body = "دسترسی به GitHub برای بررسی به‌روزرسانی‌ها ممکن نبود.\n\nعلل احتمالی: عدم اتصال به اینترنت، مسدود بودن HTTPS خروجی amwall توسط دیوار آتش، یا محدودیت نرخ API GitHub (۶۰ درخواست ناشناس در ساعت). بعدا دوباره امتحان کنید."
admin_required_body = "مدیریت فیلترها به دسترسی مدیر سیستم نیاز دارد.\n\namwall را ببندید و از یک ترمینال بالادستی دوباره اجرا کنید\n(کلیک راست → \"اجرا به عنوان مدیر\")."
delete_rule_confirm = "قانون \"%{name}\" حذف شود؟"
bulk_delete_confirm = "%{count} مورد از پروفایل حذف شود؟\n\nاین عمل قابل بازگشت نیست."
exit_body = "فیلترها در حال حاضر فعال هستند. خروج از amwall آن‌ها را فعال نگه می‌دارد (پس از بسته شدن فرآیند باقی می‌مانند). ادامه می‌دهید؟"
clear_log_body = "گزارش بسته‌ها پاک شود؟ این عمل زبانه گزارش حافظه را خالی و فایل گزارش روی دیسک را کوتاه می‌کند. این عمل قابل بازگشت نیست."
emergency_reset_body = "بازنشانی اضطراری موارد زیر را انجام می‌دهد:\n\n• حذف تمام فیلترهای WFP نصب‌شده توسط amwall\n• خالی کردن پروفایل برنامه‌ها و فهرست قوانین کاربر\n• غیرفعال کردن فعال‌سازی فیلترها\n\nاگر amwall چیزی را مسدود می‌کند که نمی‌توانید شناسایی کنید و باید رفتار پیش‌فرض شبکه سیستم‌عامل را بازیابی کنید، از این گزینه استفاده کنید. تغییر فوری است. ادامه می‌دهید؟"
allow_one_body = "%{name} در حال حاضر مسدود است. اجازه دادن به آن باعث می‌شود در تلاش بعدی به شبکه دسترسی پیدا کند.\n\nادامه می‌دهید؟"
allow_many_body = "%{count} برنامه مسدودشده قبلی به حالت مجاز تغییر خواهند یافت. در تلاش بعدی به شبکه دسترسی خواهند داشت.\n\nادامه می‌دهید؟"
blocked_notification = "مسدودشده: %{app}"

