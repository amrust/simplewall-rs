# --- Corpo das mensagens dos diálogos ---
[message]
update_available_body = "amwall %{latest} está disponível (você está usando %{current}).\n\nAbrir a página de lançamentos no navegador?"
update_uptodate_body = "Versão atual: %{current}\nÚltima versão: %{latest}\n\nJá está atualizado."
update_error_body = "Não foi possível acessar o GitHub para verificar atualizações.\n\nPossíveis causas: sem internet, o firewall bloqueando o amwall de HTTPS de saída, ou limite de taxa da API do GitHub (60 requisições anônimas por hora). Tente novamente mais tarde."
admin_required_body = "O gerenciamento de filtros requer privilégios de Administrador.\n\nFeche o amwall e reinicie a partir de um terminal elevado\n(clique com o botão direito → \"Executar como administrador\")."
delete_rule_confirm = "Excluir a regra \"%{name}\"?"
bulk_delete_confirm = "Remover %{count} entradas do perfil?\n\nEsta ação não pode ser desfeita."
exit_body = "Os filtros estão ativados no momento. Sair do amwall os deixará em vigor (eles sobrevivem ao encerramento do processo). Continuar?"
clear_log_body = "Limpar o registro de pacotes? Isso esvazia a aba de registro na memória e trunca o arquivo de registro no disco. A ação não pode ser desfeita."
emergency_reset_body = "A redefinição de emergência irá:\n\n• Remover todos os filtros WFP instalados pelo amwall\n• Esvaziar o Perfil de Aplicativos e a lista de Regras do usuário\n• Desativar Ativar filtros\n\nUse isto se o amwall estiver bloqueando algo que você não consegue identificar e precisa restaurar o comportamento de rede padrão do sistema. A alteração é imediata. Continuar?"
allow_one_body = "%{name} está bloqueado no momento. Permitir fará com que ele acesse a rede na próxima tentativa.\n\nContinuar?"
allow_many_body = "%{count} aplicativos anteriormente bloqueados serão definidos como Permitidos. Eles acessarão a rede na próxima tentativa.\n\nContinuar?"
