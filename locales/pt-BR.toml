# --- Assistente de primeira execução ---
[wizard]
title = "Boas-vindas ao amwall"
subtitle = "Importar configuração do simplewall?"
import_btn = "Importar"
start_fresh_btn = "Começar do zero"
body = """O amwall encontrou uma configuração existente do simplewall:

• Caminho: %{path}
• %{apps} aplicativo(s) com regras
• %{rules} regra(s) personalizada(s)

A importação copia o profile.xml do simplewall para o amwall e o utiliza como ponto de partida. O simplewall permanece instalado e seus filtros de kernel existentes continuam ativos — desative o simplewall antes de clicar em "Ativar filtros" no amwall para evitar que ambos os firewalls apliquem regras sobrepostas.

Você pode executar Arquivo → Importar depois, caso queira pular agora."""

