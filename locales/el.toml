# --- Οδηγός πρώτης εκτέλεσης ---
[wizard]
title = "Καλώς ήρθατε στο amwall"
subtitle = "Εισαγωγή ρυθμίσεων simplewall;"
import_btn = "Εισαγωγή"
start_fresh_btn = "Νέα εκκίνηση"
body = """Το amwall βρήκε μια υπάρχουσα ρύθμιση παραμέτρων simplewall:

• Διαδρομή: %{path}
• %{apps} εφαρμογή(-ές) με κανόνες
• %{rules} προσαρμοσμένος(-οι) κανόνας(-ες)

Η εισαγωγή αντιγράφει το profile.xml του simplewall στο amwall και το χρησιμοποιεί ως σημείο εκκίνησης. Το simplewall παραμένει εγκατεστημένο και τα υπάρχοντα φίλτρα πυρήνα παραμένουν ενεργά — απενεργοποιήστε το simplewall πριν πατήσετε «Ενεργοποίηση φίλτρων» στο amwall για να αποφύγετε την εφαρμογή επικαλυπτόμενων κανόνων από τα δύο τείχη προστασίας.

Μπορείτε να εκτελέσετε Αρχείο → Εισαγωγή αργότερα αν παραλείψετε τώρα."""

