# --- Μηνύματα σώματος διαλόγων ---
[message]
update_available_body = "Το amwall %{latest} είναι διαθέσιμο (τρέχετε %{current}).\n\nΆνοιγμα της σελίδας εκδόσεων στο πρόγραμμα περιήγησης;"
update_uptodate_body = "Τρέχουσα έκδοση: %{current}\nΤελευταία έκδοση: %{latest}\n\nΉδη ενημερωμένο."
update_error_body = "Δεν ήταν δυνατή η σύνδεση στο GitHub για έλεγχο ενημερώσεων.\n\nΠιθανές αιτίες: χωρίς σύνδεση στο διαδίκτυο, το τείχος προστασίας αποκλείει το amwall από εξερχόμενο HTTPS ή όριο ρυθμού API GitHub (60 ανώνυμα αιτήματα ανά ώρα). Δοκιμάστε ξανά αργότερα."
admin_required_body = "Η διαχείριση φίλτρων απαιτεί δικαιώματα Διαχειριστή.\n\nΚλείστε το amwall και επανεκκινήστε από ανυψωμένο κέλυφος\n(δεξί κλικ → \"Εκτέλεση ως διαχειριστής\")."
delete_rule_confirm = "Διαγραφή του κανόνα \"%{name}\";"
bulk_delete_confirm = "Αφαίρεση %{count} εγγραφών από το προφίλ;\n\nΑυτό δεν μπορεί να αναιρεθεί."
exit_body = "Τα φίλτρα είναι ενεργοποιημένα αυτή τη στιγμή. Το κλείσιμο του amwall θα τα αφήσει στη θέση τους (επιβιώνουν μετά τον τερματισμό). Συνέχεια;"
clear_log_body = "Εκκαθάριση του αρχείου καταγραφής πακέτων; Αυτό αδειάζει την καρτέλα καταγραφής στη μνήμη και αποκόπτει το αρχείο καταγραφής στο δίσκο. Η ενέργεια δεν μπορεί να αναιρεθεί."
emergency_reset_body = "Η επείγουσα επαναφορά θα:\n\n• Αφαιρέσει κάθε φίλτρο WFP που εγκατέστησε το amwall\n• Αδειάσει τις λίστες προφίλ εφαρμογών και κανόνων χρήστη\n• Απενεργοποιήσει τα Ενεργοποίηση φίλτρων\n\nΧρησιμοποιήστε αυτό αν το amwall αποκλείει κάτι που δεν μπορείτε να εντοπίσετε και χρειάζεστε να επαναφέρετε την προεπιλεγμένη συμπεριφορά δικτύου του λειτουργικού συστήματος. Η αλλαγή είναι άμεση. Συνέχεια;"
allow_one_body = "Το %{name} είναι αυτή τη στιγμή αποκλεισμένο. Η αποδοχή θα του επιτρέψει πρόσβαση στο δίκτυο την επόμενη φορά που θα δοκιμάσει.\n\nΣυνέχεια;"
allow_many_body = "%{count} προηγουμένως αποκλεισμένες εφαρμογές θα οριστούν σε Αποδοχή. Θα αποκτήσουν πρόσβαση στο δίκτυο την επόμενη φορά που θα δοκιμάσουν.\n\nΣυνέχεια;"
blocked_notification = "Αποκλείστηκε: %{app}"

