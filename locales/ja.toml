admin_required_body = "フィルター管理には管理者権限が必要です。\n\namwall を閉じて、管理者権限のターミナルから再起動してください\n（右クリック → \"管理者として実行\"）。"
delete_rule_confirm = "ルール \"%{name}\" を削除しますか？"
bulk_delete_confirm = "プロファイルから %{count} 件のエントリを削除しますか？\n\nこの操作は元に戻せません。"
exit_body = "フィルターは現在有効です。amwall を終了してもフィルターはそのまま残ります（プロセス終了後も有効）。続行しますか？"
clear_log_body = "パケットログを消去しますか？メモリ内のログタブが空になり、ディスク上のログファイルが切り詰められます。この操作は元に戻せません。"
emergency_reset_body = "緊急リセットは以下を実行します：\n\n• amwall がインストールしたすべての WFP フィルターを削除\n• アプリプロファイルとユーザールールリストを空にする\n• フィルター有効を解除\n\namwall が識別できないものをブロックしていて、OS デフォルトのネットワーク動作に戻す必要がある場合に使用してください。変更は即時に適用されます。続行しますか？"
allow_one_body = "%{name} は現在ブロックされています。許可すると、次回のアクセス時にネットワークに接続できるようになります。\n\n続行しますか？"
allow_many_body = "以前ブロックされた %{count} 件のアプリが許可に設定されます。次回のアクセス時にネットワークに接続できるようになります。\n\n続行しますか？"
