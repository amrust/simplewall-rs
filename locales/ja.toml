# --- 初回起動ウィザード ---
[wizard]
title = "amwall へようこそ"
subtitle = "simplewall の設定をインポートしますか？"
import_btn = "インポート"
start_fresh_btn = "新規で開始"
body = """amwall は既存の simplewall 設定を検出しました：

• パス：%{path}
• %{apps} 件のアプリとルール
• %{rules} 件のカスタムルール

インポートすると simplewall の profile.xml が amwall にコピーされ、初期設定として使用されます。simplewall はインストールされたままで、既存のカーネルフィルターも有効です。重複するルールの適用を避けるため、amwall で「フィルターを有効にする」をクリックする前に simplewall を無効にしてください。

今スキップしても、後で ファイル → インポート から実行できます。"""

