# --- Guide vid första start ---
[wizard]
title = "Välkommen till amwall"
subtitle = "Importera simplewall-konfiguration?"
import_btn = "Importera"
start_fresh_btn = "Börja från början"
body = """amwall hittade en befintlig simplewall-konfiguration:

• Sökväg: %{path}
• %{apps} app(ar) med regler
• %{rules} anpassade regler

Import kopierar simplewall:s profile.xml till amwall och använder den som utgångspunkt. simplewall förblir installerat och dess kernelfilter förblir aktiva — inaktivera simplewall innan du klickar på "Aktivera filter" i amwall för att undvika att båda brandväggarna tillämpar överlappande regler.

Du kan köra Arkiv → Importera senare om du hoppar över nu."""

