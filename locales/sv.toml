bulk_delete_confirm = "Ta bort %{count} poster från profilen?\n\nDetta kan inte ångras."
exit_body = "Filter är för närvarande aktiverade. Att avsluta amwall lämnar dem på plats (de överlever processavslut). Fortsätta?"
clear_log_body = "Rensa paketloggen? Detta tömmer loggfliken i minnet och trunkerar loggfilen på disk. Åtgärden kan inte ångras."
emergency_reset_body = "Nöd-återställning kommer att:\n\n• Ta bort alla WFP-filter som amwall har installerat\n• Tömma appprofilen och listan med användarregler\n• Stänga av \"Aktivera filter\"\n\nAnvänd detta om amwall blockerar något du inte kan identifiera och du behöver återställa operativsystemets standardnätverksbeteende. Ändringen sker omedelbart. Fortsätta?"
allow_one_body = "%{name} är för närvarande blockerad. Att tillåta den ger nätverksåtkomst vid nästa försök.\n\nFortsätta?"
allow_many_body = "%{count} tidigare blockerade appar kommer att ställas in på Tillåt. De får nätverksåtkomst vid nästa försök.\n\nFortsätta?"
