update_uptodate_body = "Aktuell version: %{current}\nSenaste version: %{latest}\n\nAllt är uppdaterat."
update_error_body = "Kunde inte nå GitHub för att söka efter uppdateringar.\n\nMöjliga orsaker: ingen internetanslutning, brandväggen blockerar amwall från utgående HTTPS, eller GitHubs API-gräns (60 anonyma förfrågningar per timme). Försök igen senare."
admin_required_body = "Filterhantering kräver administratörsbehörighet.\n\nStäng amwall och starta om från en upphöjd kommandotolk\n(högerklicka → \"Kör som administratör\")."
