# --- Бірінші іске қосу шебері ---
[wizard]
title = "amwall-ға қош келдіңіз"
subtitle = "simplewall конфигурациясын импорттау керек пе?"
import_btn = "Импорт"
start_fresh_btn = "Нөлден бастау"
body = """amwall бұрыннан бар simplewall конфигурациясын тапты:

• Жол: %{path}
• %{apps} ережелері бар қолданба
• %{rules} пайдаланушы ережесі

Импорт simplewall profile.xml файлын amwall-ға көшіреді және оны бастапқы нүкте ретінде пайдаланады. simplewall орнатулы күйінде қалады және оның ядро сүзгілері белсенді болып қалады — екі брандмауэрдің қабаттасқан ережелерін болдырмау үшін amwall-да \"Сүзгілерді қосу\" батырмасын баспас бұрын simplewall-ды өшіріңіз.

Қазір өткізіп жіберсеңіз, кейін Файл → Импорт арқылы орындай аласыз."""

